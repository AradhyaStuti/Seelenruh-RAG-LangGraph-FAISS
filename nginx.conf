# nginx reverse-proxy for Seelenruh.
#
# Key settings for SSE (Server-Sent Events):
#   proxy_buffering off        — disables nginx output buffer so tokens reach
#                                the client immediately instead of being batched
#   proxy_read_timeout 300s    — long enough for the LLM to finish a response
#   X-Accel-Buffering: no      — FastAPI also sets this; belt-and-suspenders
#
# For HTTPS: uncomment the TLS server block and mount certs at /etc/nginx/certs/

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Increase timeouts for long-running LLM responses
    keepalive_timeout  65;
    client_max_body_size 15m;   # matches our audio upload cap with headroom

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    upstream api {
        server api:5000;
        keepalive 32;
    }

    # ── HTTP server (redirect to HTTPS in production) ────────────────────────
    server {
        listen 80;
        server_name _;

        # Health probe — no auth required, used by Docker HEALTHCHECK
        location = /api/health {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # For production: uncomment this and use the HTTPS server below
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # SSE — must disable buffering or tokens pile up until the
            # response ends and the "stream" arrives as one big chunk
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     300s;
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
        }
    }

    # ── HTTPS server (uncomment + configure TLS certs to enable) ────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass         http://api;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_set_header Connection        "";
    #         proxy_buffering        off;
    #         proxy_cache            off;
    #         proxy_read_timeout     300s;
    #     }
    # }
}
