<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrieval Visualization — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Retrieval Visualization Workflow</h1>
<p class="subtitle">How retrieved chunks and confidence bands are surfaced in the ExplainabilityPanel</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1000" height="800" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── LEFT: BACKEND RETRIEVAL ── -->
  <rect x="10" y="10" width="450" height="760" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="235" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">Backend: Retrieval Pipeline</text>

  <!-- Query -->
  <rect x="80" y="58" width="300" height="50" rx="8" fill="#1f2937" filter="url(#sh)"/>
  <text x="230" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">User Query</text>
  <text x="230" y="98" text-anchor="middle" font-size="9" fill="#9ca3af">domain filtered (e.g. Mental Health)</text>

  <line x1="230" y1="108" x2="230" y2="136" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Dense path -->
  <rect x="30" y="138" width="170" height="70" rx="8" fill="#ea580c" filter="url(#sh)"/>
  <text x="115" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Dense Encode</text>
  <text x="115" y="178" text-anchor="middle" font-size="9" fill="#fed7aa">multilingual-e5-small</text>
  <text x="115" y="194" text-anchor="middle" font-size="9" fill="#fed7aa">→ float32[384]</text>

  <!-- Sparse path -->
  <rect x="220" y="138" width="200" height="70" rx="8" fill="#dc2626" filter="url(#sh)"/>
  <text x="320" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Sparse Tokenise</text>
  <text x="320" y="178" text-anchor="middle" font-size="9" fill="#fecaca">BM25 tokenizer</text>
  <text x="320" y="194" text-anchor="middle" font-size="9" fill="#fecaca">→ term weights</text>

  <!-- FAISS search -->
  <rect x="30" y="228" width="170" height="70" rx="8" fill="#b45309" filter="url(#sh)"/>
  <text x="115" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">FAISS IndexFlatIP</text>
  <text x="115" y="268" text-anchor="middle" font-size="9" fill="#fed7aa">.search(q, k=20)</text>
  <text x="115" y="284" text-anchor="middle" font-size="9" fill="#fed7aa">cosine sim scores</text>

  <!-- BM25 search -->
  <rect x="220" y="228" width="200" height="70" rx="8" fill="#7f1d1d" filter="url(#sh)"/>
  <text x="320" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">BM25.get_scores()</text>
  <text x="320" y="268" text-anchor="middle" font-size="9" fill="#fecaca">Okapi BM25 relevance</text>
  <text x="320" y="284" text-anchor="middle" font-size="9" fill="#fecaca">top-20 by score</text>

  <line x1="115" y1="208" x2="115" y2="226" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="208" x2="320" y2="226" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RRF -->
  <line x1="115" y1="298" x2="200" y2="336" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="298" x2="250" y2="336" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="338" width="300" height="70" rx="8" fill="#9a3412" filter="url(#sh)"/>
  <text x="230" y="362" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">RRF Merge</text>
  <text x="230" y="380" text-anchor="middle" font-size="9" fill="#fed7aa">score(d) = Σ 1 / (60 + rank_i(d))</text>
  <text x="230" y="396" text-anchor="middle" font-size="9" fill="#fed7aa">top-5 unified results</text>

  <line x1="230" y1="408" x2="230" y2="438" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Cross-encoder -->
  <rect x="80" y="440" width="300" height="80" rx="8" fill="#7c2d12" filter="url(#sh)"/>
  <text x="230" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Cross-Encoder Reranker</text>
  <text x="230" y="482" text-anchor="middle" font-size="9" fill="#fed7aa">ms-marco-MiniLM-L-6-v2</text>
  <text x="230" y="498" text-anchor="middle" font-size="9" fill="#fed7aa">score each (query, chunk) pair jointly</text>
  <text x="230" y="512" text-anchor="middle" font-size="9" fill="#fed7aa">top-3 reranked by relevance</text>

  <line x1="230" y1="520" x2="230" y2="550" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Confidence band -->
  <rect x="30" y="552" width="400" height="100" rx="8" fill="#1e1b4b" filter="url(#sh)"/>
  <text x="230" y="576" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Confidence Band Computation</text>
  <line x1="30" y1="586" x2="430" y2="586" stroke="#4338ca" stroke-width="1"/>
  <text x="50" y="606" font-size="9" fill="#a5b4fc">HIGH:   top reranker score &gt; 0.6  AND  ≥ 2 chunks</text>
  <text x="50" y="622" font-size="9" fill="#a5b4fc">LOW:    score 0.3–0.6  OR  only 1 chunk</text>
  <text x="50" y="638" font-size="9" fill="#a5b4fc">NONE:   score &lt; 0.3  OR  0 chunks retrieved</text>

  <!-- Chunks in SSE payload -->
  <line x1="230" y1="652" x2="230" y2="682" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="30" y="684" width="400" height="70" rx="8" fill="#374151" filter="url(#sh)"/>
  <text x="230" y="708" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">SSE Final Event Payload</text>
  <text x="230" y="726" text-anchor="middle" font-size="9" fill="#d1d5db">{ confidence: "High", chunks: [{id, topic, text, score, domain}] }</text>
  <text x="230" y="742" text-anchor="middle" font-size="9" fill="#d1d5db">Injected into LLM prompt + forwarded to client</text>

  <!-- ── RIGHT: FRONTEND DISPLAY ── -->
  <rect x="520" y="10" width="470" height="760" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="755" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Frontend: ExplainabilityPanel</text>

  <!-- Panel overview -->
  <rect x="540" y="60" width="430" height="200" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="755" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">explainability-panel.jsx</text>
  <line x1="540" y1="92" x2="970" y2="92" stroke="#e5e7eb" stroke-width="1"/>
  <text x="556" y="112" font-size="10" fill="#6b7280">Props: confidence, chunks, isOpen</text>
  <text x="556" y="130" font-size="10" fill="#6b7280">Collapsed by default · toggle to expand</text>

  <!-- Confidence indicator mockup -->
  <rect x="556" y="144" width="400" height="40" rx="6" fill="#16a34a" filter="url(#sh)"/>
  <text x="756" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">▲ High Confidence  (green badge)</text>

  <rect x="556" y="192" width="400" height="32" rx="6" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="560" y="212" font-size="10" fill="#374151">  Based on 3 verified knowledge base chunks</text>
  <text x="560" y="226" font-size="10" fill="#374151">  Domain: Mental Health (Usha)</text>

  <!-- Chunk cards mockup -->
  <rect x="540" y="280" width="430" height="340" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="755" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Retrieved Chunks (top 3)</text>
  <line x1="540" y1="312" x2="970" y2="312" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Chunk 1 (highest score) -->
  <rect x="556" y="320" width="400" height="84" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" filter="url(#sh)"/>
  <rect x="556" y="320" width="60" height="24" rx="3" fill="#3b82f6"/>
  <text x="586" y="335" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">CHUNK 1</text>
  <text x="626" y="334" font-size="8" fill="#6b7280">score: 0.87 (highest)</text>
  <rect x="880" y="322" width="76" height="18" rx="3" fill="#dcfce7"/>
  <text x="918" y="334" text-anchor="middle" font-size="9" fill="#166534">● 0.87</text>
  <text x="560" y="360" font-size="9" fill="#1e40af" font-weight="600">Women's Mental Health Support Maharashtra</text>
  <text x="560" y="376" font-size="9" fill="#374151">Several helplines including iCall (9152987821) and…</text>
  <text x="560" y="392" font-size="9" fill="#6b7280">Source: NIMHANS 2023  ·  Verified: human</text>

  <!-- Score bar 1 -->
  <rect x="556" y="404" width="400" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="556" y="404" width="348" height="6" rx="3" fill="#3b82f6"/>

  <!-- Chunk 2 -->
  <rect x="556" y="416" width="400" height="84" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" filter="url(#sh)"/>
  <rect x="556" y="416" width="60" height="24" rx="3" fill="#16a34a"/>
  <text x="586" y="431" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">CHUNK 2</text>
  <text x="626" y="430" font-size="8" fill="#6b7280">score: 0.74</text>
  <text x="560" y="456" font-size="9" fill="#065f46" font-weight="600">State-Funded Mental Health Clinics</text>
  <text x="560" y="472" font-size="9" fill="#374151">Maharashtra has 4 district mental health programs…</text>
  <text x="560" y="488" font-size="9" fill="#6b7280">Source: State Health Policy 2022  ·  Verified: human</text>
  <rect x="556" y="500" width="400" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="556" y="500" width="296" height="6" rx="3" fill="#22c55e"/>

  <!-- Chunk 3 -->
  <rect x="556" y="512" width="400" height="84" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1" filter="url(#sh)"/>
  <rect x="556" y="512" width="60" height="24" rx="3" fill="#f59e0b"/>
  <text x="586" y="527" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">CHUNK 3</text>
  <text x="626" y="526" font-size="8" fill="#6b7280">score: 0.61</text>
  <text x="560" y="552" font-size="9" fill="#92400e" font-weight="600">Online Counseling Platforms India</text>
  <text x="560" y="568" font-size="9" fill="#374151">iCall, Vandrevala Foundation, YourDOST offer…</text>
  <text x="560" y="584" font-size="9" fill="#6b7280">Source: Ministry of Health 2023  ·  Verified: human</text>
  <rect x="556" y="596" width="400" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="556" y="596" width="244" height="6" rx="3" fill="#f59e0b"/>

  <!-- Feedback row -->
  <rect x="540" y="640" width="430" height="80" rx="10" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="755" y="666" text-anchor="middle" font-size="11" font-weight="700" fill="#7e22ce">Feedback Buttons</text>
  <line x1="540" y1="674" x2="970" y2="674" stroke="#e9d5ff" stroke-width="1"/>

  <rect x="560" y="682" width="80" height="28" rx="6" fill="#16a34a" filter="url(#sh)"/>
  <text x="600" y="700" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">👍  Helpful</text>
  <rect x="660" y="682" width="80" height="28" rx="6" fill="#dc2626" filter="url(#sh)"/>
  <text x="700" y="700" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">👎  Not helpful</text>
  <text x="800" y="700" font-size="9" fill="#6b7280">→ POST /api/feedback  { vote, messageId, confidence, … }</text>

  <!-- Arrow from backend to frontend -->
  <line x1="460" y1="400" x2="520" y2="400" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="490" y="394" text-anchor="middle" font-size="9" fill="#374151">SSE</text>
</svg>
</body>
</html>
