<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequence Diagram — Seelenruh Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Sequence Diagram — Chat Request</h1>
<p class="subtitle">End-to-end message flow from user browser to streamed SSE response</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1060" height="900" viewBox="0 0 1060 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#16a34a"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── ACTOR HEADERS ── -->
  <!-- Columns at x: 80, 220, 380, 540, 700, 860, 1020 -->
  <rect x="20" y="20" width="120" height="46" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="80" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Browser</text>

  <rect x="160" y="20" width="120" height="46" rx="8" fill="#22c55e" filter="url(#sh)"/>
  <text x="220" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">FastAPI</text>

  <rect x="320" y="20" width="120" height="46" rx="8" fill="#a855f7" filter="url(#sh)"/>
  <text x="380" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">LangGraph</text>

  <rect x="480" y="20" width="120" height="46" rx="8" fill="#ea580c" filter="url(#sh)"/>
  <text x="540" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">RAG / Store</text>

  <rect x="640" y="20" width="120" height="46" rx="8" fill="#d97706" filter="url(#sh)"/>
  <text x="700" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">LLM Provider</text>

  <rect x="800" y="20" width="120" height="46" rx="8" fill="#64748b" filter="url(#sh)"/>
  <text x="860" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">MongoDB</text>

  <!-- Lifelines -->
  <line x1="80"  y1="66" x2="80"  y2="880" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="220" y1="66" x2="220" y2="880" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="380" y1="66" x2="380" y2="880" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="540" y1="66" x2="540" y2="880" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="700" y1="66" x2="700" y2="880" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="860" y1="66" x2="860" y2="880" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ── MESSAGES ── -->
  <!-- Each message: arrow + label + y position -->

  <!-- 1. POST /api/chat (SSE) -->
  <line x1="80" y1="100" x2="210" y2="100" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="145" y="96" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">1. POST /api/chat (EventSource)</text>
  <text x="145" y="114" text-anchor="middle" font-size="9" fill="#6b7280">{ query, domain, session_id, lang }</text>

  <!-- 2. Rate limit + auth check -->
  <rect x="210" y="124" width="20" height="60" rx="3" fill="#22c55e" opacity="0.4"/>
  <text x="240" y="140" font-size="9" fill="#15803d">2. rate_limit check</text>
  <text x="240" y="154" font-size="9" fill="#15803d">3. decode_token(JWT)</text>
  <text x="240" y="168" font-size="9" fill="#15803d">4. check jti_blacklist</text>

  <!-- 4b. check blacklist -->
  <line x1="230" y1="160" x2="850" y2="160" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="540" y="156" text-anchor="middle" font-size="9" fill="#6b7280">jti_blacklist.find_one(jti)</text>
  <line x1="850" y1="175" x2="230" y2="175" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="540" y="172" text-anchor="middle" font-size="9" fill="#6b7280">→ null (valid)</text>

  <!-- 5. graph.stream_run -->
  <line x1="230" y1="200" x2="370" y2="200" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="300" y="196" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">5. graph.stream_run()</text>

  <!-- 6. detect_language node -->
  <rect x="370" y="214" width="20" height="360" rx="3" fill="#a855f7" opacity="0.3"/>
  <text x="400" y="230" font-size="9" fill="#7e22ce">6. detect_language</text>

  <!-- 7. load_memory -->
  <line x1="390" y1="244" x2="850" y2="244" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="620" y="240" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">7. load_memory → fetch history</text>
  <line x1="850" y1="258" x2="390" y2="258" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="620" y="255" text-anchor="middle" font-size="9" fill="#6b7280">← last 8 turns</text>

  <!-- 8. route_domain -->
  <text x="400" y="282" font-size="9" fill="#7e22ce">8. route_domain (keyword heuristic)</text>

  <!-- 9. retrieve chunks -->
  <line x1="390" y1="300" x2="530" y2="300" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="460" y="296" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">9. retrieve(query, domain)</text>

  <rect x="530" y="314" width="20" height="80" rx="3" fill="#ea580c" opacity="0.3"/>
  <text x="560" y="330" font-size="9" fill="#c2410c">10. FAISS.search(vec, k=20)</text>
  <text x="560" y="346" font-size="9" fill="#c2410c">11. BM25.search(tokens, k=20)</text>
  <text x="560" y="362" font-size="9" fill="#c2410c">12. RRF fusion(dense+sparse)</text>
  <text x="560" y="378" font-size="9" fill="#c2410c">13. reranker.score(pairs)</text>

  <line x1="530" y1="396" x2="390" y2="396" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="460" y="393" text-anchor="middle" font-size="9" fill="#6b7280">← top-3 chunks + confidence</text>

  <!-- 14. web search fallback (conditional) -->
  <text x="400" y="420" font-size="9" fill="#7e22ce" font-style="italic">14. [if confidence Low] web_search fallback</text>

  <!-- 15. build_prompt + call_llm -->
  <text x="400" y="440" font-size="9" fill="#7e22ce">15. build_prompt (chunks + history + persona)</text>

  <line x1="390" y1="456" x2="690" y2="456" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="540" y="452" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">16. LLM.stream(messages)</text>
  <text x="540" y="465" text-anchor="middle" font-size="9" fill="#6b7280">Groq → Ollama → Anthropic (fallback chain)</text>

  <!-- 17. circuit breaker -->
  <rect x="690" y="474" width="20" height="80" rx="3" fill="#d97706" opacity="0.3"/>
  <text x="720" y="490" font-size="9" fill="#92400e">17. CircuitBreaker check</text>
  <text x="720" y="506" font-size="9" fill="#92400e">18. stream tokens...</text>

  <!-- 18. tokens → LangGraph → FastAPI → Browser -->
  <line x1="690" y1="556" x2="390" y2="556" stroke="#d97706" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="540" y="552" text-anchor="middle" font-size="9" fill="#92400e">token chunks (async generator)</text>

  <line x1="370" y1="580" x2="230" y2="580" stroke="#a855f7" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="300" y="576" text-anchor="middle" font-size="9" fill="#7e22ce">19. yield SSE chunk</text>

  <line x1="210" y1="600" x2="90" y2="600" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="150" y="596" text-anchor="middle" font-size="9" fill="#15803d">data: {"token": "..."}</text>

  <!-- 20. quality_check -->
  <text x="400" y="640" font-size="9" fill="#7e22ce">20. quality_check + hallucination_guardrails</text>

  <!-- 21. save_memory -->
  <line x1="390" y1="660" x2="850" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="620" y="656" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">21. save_memory (full turn)</text>

  <!-- 22. knowledge_gap? -->
  <text x="400" y="690" font-size="9" fill="#7e22ce" font-style="italic">22. [if gap] log_knowledge_gap()</text>
  <line x1="390" y1="700" x2="850" y2="700" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="620" y="696" text-anchor="middle" font-size="9" fill="#6b7280">knowledge_gaps.insert_one()</text>

  <!-- 23. feedback save -->
  <line x1="390" y1="730" x2="850" y2="730" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="620" y="726" text-anchor="middle" font-size="9" fill="#6b7280">chat_history.insert_one()</text>

  <!-- 24. SSE [DONE] -->
  <line x1="210" y1="760" x2="90" y2="760" stroke="#22c55e" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="150" y="756" text-anchor="middle" font-size="9" fill="#15803d">data: [DONE]</text>

  <!-- 25. user sends feedback -->
  <line x1="80" y1="800" x2="210" y2="800" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="145" y="796" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">25. POST /api/feedback</text>
  <text x="145" y="812" text-anchor="middle" font-size="9" fill="#6b7280">{ messageId, vote: "up"|"down" }</text>

  <line x1="230" y1="820" x2="850" y2="820" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="540" y="816" text-anchor="middle" font-size="9" fill="#6b7280">feedback_logs.insert_one()</text>
</svg>
</body>
</html>
