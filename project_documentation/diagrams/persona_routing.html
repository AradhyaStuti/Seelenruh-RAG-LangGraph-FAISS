<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Routing — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Persona Routing Diagram</h1>
<p class="subtitle">How a user query is classified and routed to the correct AI persona / sub-graph</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1000" height="820" viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── INPUT ── -->
  <rect x="360" y="20" width="280" height="64" rx="10" fill="#1f2937" filter="url(#sh)"/>
  <text x="500" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">User Query</text>
  <text x="500" y="68" text-anchor="middle" font-size="11" fill="#9ca3af">+ client-selected domain hint (optional)</text>

  <line x1="500" y1="84" x2="500" y2="124" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── LANG DETECT ── -->
  <rect x="360" y="126" width="280" height="56" rx="10" fill="#0ea5e9" filter="url(#sh)"/>
  <text x="500" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Language Detection</text>
  <text x="500" y="168" text-anchor="middle" font-size="10" fill="#e0f2fe">Devanagari script → hi · Hinglish → hi-roman · else en/de</text>

  <line x1="500" y1="182" x2="500" y2="222" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── DOMAIN ROUTER ── -->
  <rect x="340" y="224" width="320" height="80" rx="10" fill="#7c3aed" filter="url(#sh)"/>
  <text x="500" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Domain Router</text>
  <text x="500" y="272" text-anchor="middle" font-size="10" fill="#ede9fe">keyword heuristic over lowercased query</text>
  <text x="500" y="288" text-anchor="middle" font-size="10" fill="#ede9fe">client hint is accepted as strong prior signal</text>

  <!-- Branch arrows from router -->
  <line x1="390" y1="304" x2="140" y2="380" stroke="#ec4899" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="304" x2="350" y2="380" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="304" x2="650" y2="380" stroke="#10b981" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="610" y1="304" x2="860" y2="380" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Branch labels -->
  <text x="245" y="352" text-anchor="middle" font-size="10" fill="#ec4899" font-weight="700">Mental Health</text>
  <text x="390" y="366" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="700">Legal</text>
  <text x="610" y="366" text-anchor="middle" font-size="10" fill="#10b981" font-weight="700">Govt Schemes</text>
  <text x="755" y="352" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="700">Safety</text>

  <!-- ── USHA PERSONA ── -->
  <rect x="20" y="382" width="240" height="220" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="382" width="240" height="40" rx="10" fill="#ec4899"/>
  <text x="140" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Usha</text>
  <text x="140" y="426" text-anchor="middle" font-size="10" fill="#fce7f3">Mental Health Companion</text>
  <text x="36" y="454" font-size="10" fill="#831843">Keywords detected:</text>
  <text x="36" y="470" font-size="9" fill="#9d174d">anxiety, depression, stress, mental,</text>
  <text x="36" y="484" font-size="9" fill="#9d174d">therapy, suicide, emotional, counseling,</text>
  <text x="36" y="498" font-size="9" fill="#9d174d">sad, hopeless, burnout, grief</text>
  <line x1="20" y1="512" x2="260" y2="512" stroke="#fbcfe8" stroke-width="1"/>
  <text x="36" y="530" font-size="10" fill="#831843">Tone: empathetic, non-clinical</text>
  <text x="36" y="546" font-size="9" fill="#9d174d">Safety: crisis detection node</text>
  <text x="36" y="562" font-size="9" fill="#9d174d">Emotion: detected + logged</text>
  <text x="36" y="578" font-size="9" fill="#9d174d">Breathing companion: available</text>

  <!-- ── UMANG PERSONA ── -->
  <rect x="280" y="382" width="200" height="220" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <rect x="280" y="382" width="200" height="40" rx="10" fill="#f59e0b"/>
  <text x="380" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Umang</text>
  <text x="380" y="426" text-anchor="middle" font-size="10" fill="#fef3c7">Legal Aid Advisor</text>
  <text x="296" y="454" font-size="10" fill="#78350f">Keywords detected:</text>
  <text x="296" y="470" font-size="9" fill="#92400e">legal, law, rights, FIR, court,</text>
  <text x="296" y="484" font-size="9" fill="#92400e">domestic violence, divorce, RTI,</text>
  <text x="296" y="498" font-size="9" fill="#92400e">harassment, POSH, section, IPC</text>
  <line x1="280" y1="512" x2="480" y2="512" stroke="#fde68a" stroke-width="1"/>
  <text x="296" y="530" font-size="10" fill="#78350f">Tone: formal, factual</text>
  <text x="296" y="546" font-size="9" fill="#92400e">Timeline: auto-extracted</text>
  <text x="296" y="562" font-size="9" fill="#92400e">Doc templates: RTI, CC, Rent</text>

  <!-- ── AAROGYA PERSONA ── -->
  <rect x="500" y="382" width="200" height="220" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
  <rect x="500" y="382" width="200" height="40" rx="10" fill="#10b981"/>
  <text x="600" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Aarogya</text>
  <text x="600" y="426" text-anchor="middle" font-size="10" fill="#d1fae5">Govt Schemes Navigator</text>
  <text x="516" y="454" font-size="10" fill="#065f46">Keywords detected:</text>
  <text x="516" y="470" font-size="9" fill="#047857">scheme, yojana, ayushman, PM,</text>
  <text x="516" y="484" font-size="9" fill="#047857">ration, pension, subsidy, BPL,</text>
  <text x="516" y="498" font-size="9" fill="#047857">eligibility, government, welfare</text>
  <line x1="500" y1="512" x2="700" y2="512" stroke="#a7f3d0" stroke-width="1"/>
  <text x="516" y="530" font-size="10" fill="#065f46">Tone: simple, clear</text>
  <text x="516" y="546" font-size="9" fill="#047857">Checker: rule-based eligibility</text>
  <text x="516" y="562" font-size="9" fill="#047857">Output: scheme cards + links</text>

  <!-- ── RAKSHA PERSONA ── -->
  <rect x="720" y="382" width="260" height="220" rx="10" fill="#fff1f2" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <rect x="720" y="382" width="260" height="40" rx="10" fill="#ef4444"/>
  <text x="850" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Raksha</text>
  <text x="850" y="426" text-anchor="middle" font-size="10" fill="#fee2e2">Safety & Emergency Guide</text>
  <text x="736" y="454" font-size="10" fill="#7f1d1d">Keywords detected:</text>
  <text x="736" y="470" font-size="9" fill="#991b1b">violence, abuse, unsafe, help, danger,</text>
  <text x="736" y="484" font-size="9" fill="#991b1b">threat, harassment, assault, safety,</text>
  <text x="736" y="498" font-size="9" fill="#991b1b">emergency, police, shelter, escape</text>
  <line x1="720" y1="512" x2="980" y2="512" stroke="#fecaca" stroke-width="1"/>
  <text x="736" y="530" font-size="10" fill="#7f1d1d">Tone: calm, urgent-aware</text>
  <text x="736" y="546" font-size="9" fill="#991b1b">Emergency: 100/1091 prominently shown</text>
  <text x="736" y="562" font-size="9" fill="#991b1b">Threat level: detected + logged</text>
  <text x="736" y="578" font-size="9" fill="#991b1b">Resources: shelter, legal aid</text>

  <!-- Convergence arrows to shared pipeline -->
  <line x1="140" y1="602" x2="430" y2="660" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="380" y1="602" x2="460" y2="660" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="600" y1="602" x2="540" y2="660" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="850" y1="602" x2="570" y2="660" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ── SHARED PIPELINE ── -->
  <rect x="200" y="662" width="600" height="60" rx="10" fill="#374151" filter="url(#sh)"/>
  <text x="500" y="688" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Shared Pipeline: RAG retrieve → LLM call → Quality check → SSE stream</text>
  <text x="500" y="706" text-anchor="middle" font-size="10" fill="#d1d5db">Groq → Ollama → Anthropic fallback · FAISS+BM25+RRF+reranker · hallucination guardrails</text>

  <line x1="500" y1="722" x2="500" y2="762" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── OUTPUT ── -->
  <rect x="300" y="764" width="400" height="46" rx="10" fill="#1f2937" filter="url(#sh)"/>
  <text x="500" y="792" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SSE Streamed Response → Browser</text>
</svg>
</body>
</html>
