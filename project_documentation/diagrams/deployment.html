<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deployment Diagram — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Deployment Architecture</h1>
<p class="subtitle">Docker → Hugging Face Spaces · MongoDB Atlas · External LLM APIs</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1060" height="760" viewBox="0 0 1060 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- INTERNET CLOUD background -->
  <rect x="10" y="10" width="1040" height="120" rx="14" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="530" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1" letter-spacing="1">INTERNET / USER BROWSER</text>

  <!-- Browser box -->
  <rect x="30" y="50" width="200" height="60" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="130" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">User Browser</text>
  <text x="130" y="94" text-anchor="middle" font-size="9" fill="#bfdbfe">React SPA · EventSource SSE</text>

  <!-- Admin browser -->
  <rect x="260" y="50" width="200" height="60" rx="8" fill="#6366f1" filter="url(#sh)"/>
  <text x="360" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Admin Browser</text>
  <text x="360" y="94" text-anchor="middle" font-size="9" fill="#c7d2fe">Admin Panel · X-Admin-Key</text>

  <!-- Mobile / Alt -->
  <rect x="490" y="50" width="200" height="60" rx="8" fill="#8b5cf6" filter="url(#sh)"/>
  <text x="590" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Mobile Browser</text>
  <text x="590" y="94" text-anchor="middle" font-size="9" fill="#ddd6fe">Responsive PWA-ready</text>

  <!-- Arrows from browsers down -->
  <line x1="130" y1="110" x2="320" y2="180" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="360" y1="110" x2="390" y2="180" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="590" y1="110" x2="460" y2="180" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- HF SPACES CONTAINER -->
  <rect x="100" y="152" width="760" height="380" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="480" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c" letter-spacing="1">HUGGING FACE SPACES — Docker Container</text>

  <!-- Nginx/reverse proxy -->
  <rect x="300" y="192" width="360" height="50" rx="8" fill="#374151" filter="url(#sh)"/>
  <text x="480" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Nginx Reverse Proxy  :7860</text>
  <text x="480" y="230" text-anchor="middle" font-size="9" fill="#d1d5db">route / → React SPA  ·  /api/* → FastAPI</text>

  <line x1="480" y1="242" x2="480" y2="272" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Inner containers side by side -->
  <!-- React container -->
  <rect x="120" y="274" width="300" height="200" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="270" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Frontend Container</text>
  <text x="270" y="318" text-anchor="middle" font-size="10" fill="#3b82f6">Vite build → /dist (static)</text>
  <line x1="120" y1="326" x2="420" y2="326" stroke="#bfdbfe" stroke-width="1"/>
  <text x="136" y="344" font-size="10" fill="#374151">React 18 + Vite</text>
  <text x="136" y="360" font-size="10" fill="#374151">Tailwind CSS</text>
  <text x="136" y="376" font-size="10" fill="#374151">shadcn/ui + Radix UI</text>
  <text x="136" y="392" font-size="10" fill="#374151">i18n: en / hi / de</text>
  <text x="136" y="408" font-size="10" fill="#374151">Admin Panel (6 pages)</text>
  <text x="136" y="424" font-size="10" fill="#374151">Eligibility Checker (rule-based)</text>
  <text x="136" y="448" font-size="9" fill="#6b7280">Built once at image build time</text>

  <!-- FastAPI container -->
  <rect x="440" y="274" width="400" height="200" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="640" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">FastAPI Server  :8000</text>
  <text x="640" y="318" text-anchor="middle" font-size="10" fill="#16a34a">uvicorn · async · Python 3.11</text>
  <line x1="440" y1="326" x2="840" y2="326" stroke="#bbf7d0" stroke-width="1"/>
  <text x="456" y="344" font-size="10" fill="#374151">LangGraph orchestrator</text>
  <text x="456" y="360" font-size="10" fill="#374151">FAISS + BM25 + Reranker (in-process)</text>
  <text x="456" y="376" font-size="10" fill="#374151">JWT auth · slowapi rate limiter</text>
  <text x="456" y="392" font-size="10" fill="#374151">SSE streaming (StreamingResponse)</text>
  <text x="456" y="408" font-size="10" fill="#374151">Motor (async MongoDB driver)</text>
  <text x="456" y="424" font-size="10" fill="#374151">structlog · optional Sentry</text>
  <text x="456" y="448" font-size="9" fill="#6b7280">Models loaded once at startup (multilingual-e5, MiniLM)</text>

  <!-- ── EXTERNAL SERVICES ── -->
  <!-- MongoDB Atlas -->
  <rect x="10" y="560" width="240" height="140" rx="10" fill="#064e3b" filter="url(#sh)"/>
  <text x="130" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">MongoDB Atlas</text>
  <text x="130" y="604" text-anchor="middle" font-size="9" fill="#6ee7b7">managed cloud · Motor async</text>
  <line x1="10" y1="612" x2="250" y2="612" stroke="#047857" stroke-width="1"/>
  <text x="26" y="630" font-size="9" fill="#a7f3d0">14 named collections</text>
  <text x="26" y="646" font-size="9" fill="#a7f3d0">TTL indexes (sessions/tokens)</text>
  <text x="26" y="662" font-size="9" fill="#a7f3d0">srv:// connection string via env</text>
  <text x="26" y="678" font-size="9" fill="#a7f3d0">MONGO_URI = env var</text>

  <!-- Groq -->
  <rect x="270" y="560" width="160" height="140" rx="10" fill="#d97706" filter="url(#sh)"/>
  <text x="350" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Groq API</text>
  <text x="350" y="604" text-anchor="middle" font-size="9" fill="#fef3c7">Primary LLM</text>
  <line x1="270" y1="612" x2="430" y2="612" stroke="#b45309" stroke-width="1"/>
  <text x="286" y="630" font-size="9" fill="#fef3c7">llama-3.3-70b-versatile</text>
  <text x="286" y="646" font-size="9" fill="#fef3c7">fast inference</text>
  <text x="286" y="662" font-size="9" fill="#fef3c7">GROQ_API_KEY env</text>
  <text x="286" y="678" font-size="9" fill="#fef3c7">CircuitBreaker guarded</text>

  <!-- Ollama -->
  <rect x="450" y="560" width="160" height="140" rx="10" fill="#7c3aed" filter="url(#sh)"/>
  <text x="530" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Ollama</text>
  <text x="530" y="604" text-anchor="middle" font-size="9" fill="#ede9fe">Fallback 1</text>
  <line x1="450" y1="612" x2="610" y2="612" stroke="#6d28d9" stroke-width="1"/>
  <text x="466" y="630" font-size="9" fill="#ede9fe">local inference</text>
  <text x="466" y="646" font-size="9" fill="#ede9fe">OLLAMA_BASE_URL env</text>
  <text x="466" y="662" font-size="9" fill="#ede9fe">optional — skipped if</text>
  <text x="466" y="678" font-size="9" fill="#ede9fe">URL not configured</text>

  <!-- Anthropic -->
  <rect x="630" y="560" width="200" height="140" rx="10" fill="#1e40af" filter="url(#sh)"/>
  <text x="730" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Anthropic API</text>
  <text x="730" y="604" text-anchor="middle" font-size="9" fill="#bfdbfe">Fallback 2</text>
  <line x1="630" y1="612" x2="830" y2="612" stroke="#1d4ed8" stroke-width="1"/>
  <text x="646" y="630" font-size="9" fill="#bfdbfe">claude-haiku-4-5</text>
  <text x="646" y="646" font-size="9" fill="#bfdbfe">ANTHROPIC_API_KEY env</text>
  <text x="646" y="662" font-size="9" fill="#bfdbfe">last resort provider</text>
  <text x="646" y="678" font-size="9" fill="#bfdbfe">CircuitBreaker guarded</text>

  <!-- Web Search -->
  <rect x="850" y="560" width="200" height="140" rx="10" fill="#374151" filter="url(#sh)"/>
  <text x="950" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Web Search</text>
  <text x="950" y="604" text-anchor="middle" font-size="9" fill="#d1d5db">Low-confidence fallback</text>
  <line x1="850" y1="612" x2="1050" y2="612" stroke="#4b5563" stroke-width="1"/>
  <text x="866" y="630" font-size="9" fill="#d1d5db">DuckDuckGo</text>
  <text x="866" y="646" font-size="9" fill="#d1d5db">Wikipedia REST API</text>
  <text x="866" y="662" font-size="9" fill="#d1d5db">Brave Search (BRAVE_KEY)</text>
  <text x="866" y="678" font-size="9" fill="#d1d5db">concurrent · retry backoff</text>

  <!-- Arrows: FastAPI → external services -->
  <line x1="480" y1="532" x2="130" y2="558" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="530" y1="532" x2="350" y2="558" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="600" y1="532" x2="530" y2="558" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="660" y1="532" x2="730" y2="558" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="720" y1="532" x2="950" y2="558" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ENV VARS note -->
  <rect x="30" y="714" width="1000" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="530" y="736" text-anchor="middle" font-size="10" fill="#6b7280">Env vars: MONGO_URI · JWT_SECRET · ADMIN_KEY · GROQ_API_KEY · ANTHROPIC_API_KEY · OLLAMA_BASE_URL · BRAVE_KEY · SENTRY_DSN</text>
</svg>
</body>
</html>
