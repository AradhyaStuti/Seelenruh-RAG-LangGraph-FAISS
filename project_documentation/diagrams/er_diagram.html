<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Diagram — Seelenruh MongoDB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Database ER Diagram — MongoDB</h1>
<p class="subtitle">14 collections · Motor async driver · TTL indexes on session/token documents</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1100" height="900" viewBox="0 0 1100 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Helper macro: collection box is drawn manually for each -->

  <!-- ── users ── (central) -->
  <rect x="400" y="30" width="300" height="180" rx="10" fill="#1e40af" filter="url(#sh)"/>
  <rect x="400" y="30" width="300" height="36" rx="10" fill="#1d4ed8"/>
  <text x="550" y="54" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">users</text>
  <line x1="400" y1="66" x2="700" y2="66" stroke="#3b82f6" stroke-width="1"/>
  <text x="420" y="86" font-size="10" fill="#93c5fd">🔑 _id: ObjectId</text>
  <text x="420" y="102" font-size="10" fill="#bfdbfe">email: String (unique)</text>
  <text x="420" y="118" font-size="10" fill="#bfdbfe">password_hash: String</text>
  <text x="420" y="134" font-size="10" fill="#bfdbfe">name: String</text>
  <text x="420" y="150" font-size="10" fill="#bfdbfe">lang: String</text>
  <text x="420" y="166" font-size="10" fill="#bfdbfe">created_at: DateTime</text>
  <text x="420" y="182" font-size="10" fill="#bfdbfe">role: "user" | "admin"</text>
  <text x="420" y="198" font-size="10" fill="#93c5fd">idx: email (unique)</text>

  <!-- ── chat_sessions ── -->
  <rect x="30" y="30" width="290" height="160" rx="10" fill="#065f46" filter="url(#sh)"/>
  <rect x="30" y="30" width="290" height="36" rx="10" fill="#047857"/>
  <text x="175" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">chat_sessions</text>
  <line x1="30" y1="66" x2="320" y2="66" stroke="#6ee7b7" stroke-width="1"/>
  <text x="50" y="86" font-size="10" fill="#6ee7b7">🔑 _id: ObjectId</text>
  <text x="50" y="102" font-size="10" fill="#a7f3d0">session_id: String (unique)</text>
  <text x="50" y="118" font-size="10" fill="#a7f3d0">user_id: ObjectId → users</text>
  <text x="50" y="134" font-size="10" fill="#a7f3d0">domain: String</text>
  <text x="50" y="150" font-size="10" fill="#a7f3d0">started_at: DateTime</text>
  <text x="50" y="166" font-size="10" fill="#a7f3d0">last_active: DateTime</text>
  <text x="50" y="182" font-size="10" fill="#6ee7b7">idx: user_id, session_id</text>

  <!-- ── chat_history ── -->
  <rect x="30" y="220" width="290" height="180" rx="10" fill="#064e3b" filter="url(#sh)"/>
  <rect x="30" y="220" width="290" height="36" rx="10" fill="#065f46"/>
  <text x="175" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">chat_history</text>
  <line x1="30" y1="256" x2="320" y2="256" stroke="#6ee7b7" stroke-width="1"/>
  <text x="50" y="276" font-size="10" fill="#6ee7b7">🔑 _id: ObjectId</text>
  <text x="50" y="292" font-size="10" fill="#a7f3d0">session_id: String → chat_sessions</text>
  <text x="50" y="308" font-size="10" fill="#a7f3d0">user_id: ObjectId → users</text>
  <text x="50" y="324" font-size="10" fill="#a7f3d0">role: "user" | "assistant"</text>
  <text x="50" y="340" font-size="10" fill="#a7f3d0">content: String</text>
  <text x="50" y="356" font-size="10" fill="#a7f3d0">domain: String</text>
  <text x="50" y="372" font-size="10" fill="#a7f3d0">lang: String</text>
  <text x="50" y="388" font-size="10" fill="#6ee7b7">idx: session_id, created_at</text>

  <!-- ── refresh_tokens ── -->
  <rect x="780" y="30" width="290" height="160" rx="10" fill="#7c2d12" filter="url(#sh)"/>
  <rect x="780" y="30" width="290" height="36" rx="10" fill="#9a3412"/>
  <text x="925" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">refresh_tokens</text>
  <line x1="780" y1="66" x2="1070" y2="66" stroke="#fca5a5" stroke-width="1"/>
  <text x="800" y="86" font-size="10" fill="#fca5a5">🔑 _id: ObjectId</text>
  <text x="800" y="102" font-size="10" fill="#fecaca">user_id: ObjectId → users</text>
  <text x="800" y="118" font-size="10" fill="#fecaca">token: String (unique)</text>
  <text x="800" y="134" font-size="10" fill="#fecaca">jti: String</text>
  <text x="800" y="150" font-size="10" fill="#fecaca">expires_at: DateTime</text>
  <text x="800" y="166" font-size="10" fill="#fca5a5">TTL idx: expires_at</text>
  <text x="800" y="182" font-size="10" fill="#fca5a5">idx: user_id</text>

  <!-- ── jti_blacklist ── -->
  <rect x="780" y="220" width="290" height="130" rx="10" fill="#581c87" filter="url(#sh)"/>
  <rect x="780" y="220" width="290" height="36" rx="10" fill="#6d28d9"/>
  <text x="925" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">jti_blacklist</text>
  <line x1="780" y1="256" x2="1070" y2="256" stroke="#c4b5fd" stroke-width="1"/>
  <text x="800" y="276" font-size="10" fill="#c4b5fd">🔑 _id: ObjectId</text>
  <text x="800" y="292" font-size="10" fill="#ddd6fe">jti: String (unique)</text>
  <text x="800" y="308" font-size="10" fill="#ddd6fe">user_id: ObjectId → users</text>
  <text x="800" y="324" font-size="10" fill="#ddd6fe">expires_at: DateTime</text>
  <text x="800" y="340" font-size="10" fill="#c4b5fd">TTL idx: expires_at</text>

  <!-- ── feedback_logs ── -->
  <rect x="400" y="240" width="290" height="200" rx="10" fill="#7f1d1d" filter="url(#sh)"/>
  <rect x="400" y="240" width="290" height="36" rx="10" fill="#991b1b"/>
  <text x="545" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">feedback_logs</text>
  <line x1="400" y1="276" x2="690" y2="276" stroke="#fca5a5" stroke-width="1"/>
  <text x="420" y="296" font-size="10" fill="#fca5a5">🔑 _id: ObjectId</text>
  <text x="420" y="312" font-size="10" fill="#fecaca">message_id: String</text>
  <text x="420" y="328" font-size="10" fill="#fecaca">vote: "up" | "down"</text>
  <text x="420" y="344" font-size="10" fill="#fecaca">user_id: ObjectId? → users</text>
  <text x="420" y="360" font-size="10" fill="#fecaca">session_id: String</text>
  <text x="420" y="376" font-size="10" fill="#fecaca">domain, persona, confidence</text>
  <text x="420" y="392" font-size="10" fill="#fecaca">query: String</text>
  <text x="420" y="408" font-size="10" fill="#fecaca">response: String</text>
  <text x="420" y="424" font-size="10" fill="#fca5a5">idx: message_id, created_at</text>

  <!-- ── knowledge_gaps ── -->
  <rect x="30" y="430" width="290" height="150" rx="10" fill="#1e1b4b" filter="url(#sh)"/>
  <rect x="30" y="430" width="290" height="36" rx="10" fill="#312e81"/>
  <text x="175" y="454" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">knowledge_gaps</text>
  <line x1="30" y1="466" x2="320" y2="466" stroke="#a5b4fc" stroke-width="1"/>
  <text x="50" y="486" font-size="10" fill="#a5b4fc">🔑 _id: ObjectId</text>
  <text x="50" y="502" font-size="10" fill="#c7d2fe">query: String</text>
  <text x="50" y="518" font-size="10" fill="#c7d2fe">domain: String</text>
  <text x="50" y="534" font-size="10" fill="#c7d2fe">confidence: String</text>
  <text x="50" y="550" font-size="10" fill="#c7d2fe">session_id: String</text>
  <text x="50" y="566" font-size="10" fill="#a5b4fc">idx: domain, created_at</text>

  <!-- ── admin_logs ── -->
  <rect x="780" y="380" width="290" height="150" rx="10" fill="#292524" filter="url(#sh)"/>
  <rect x="780" y="380" width="290" height="36" rx="10" fill="#44403c"/>
  <text x="925" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">admin_logs</text>
  <line x1="780" y1="416" x2="1070" y2="416" stroke="#d6d3d1" stroke-width="1"/>
  <text x="800" y="436" font-size="10" fill="#d6d3d1">🔑 _id: ObjectId</text>
  <text x="800" y="452" font-size="10" fill="#e7e5e4">admin_id: ObjectId → users</text>
  <text x="800" y="468" font-size="10" fill="#e7e5e4">action: String</text>
  <text x="800" y="484" font-size="10" fill="#e7e5e4">target: String</text>
  <text x="800" y="500" font-size="10" fill="#e7e5e4">detail: Object</text>
  <text x="800" y="516" font-size="10" fill="#d6d3d1">idx: admin_id, created_at</text>

  <!-- ── knowledge_reviews ── -->
  <rect x="400" y="470" width="290" height="150" rx="10" fill="#164e63" filter="url(#sh)"/>
  <rect x="400" y="470" width="290" height="36" rx="10" fill="#0e7490"/>
  <text x="545" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">knowledge_reviews</text>
  <line x1="400" y1="506" x2="690" y2="506" stroke="#67e8f9" stroke-width="1"/>
  <text x="420" y="526" font-size="10" fill="#67e8f9">🔑 _id: ObjectId</text>
  <text x="420" y="542" font-size="10" fill="#a5f3fc">chunk_id: String</text>
  <text x="420" y="558" font-size="10" fill="#a5f3fc">reviewer_id: ObjectId → users</text>
  <text x="420" y="574" font-size="10" fill="#a5f3fc">status: "approved"|"rejected"</text>
  <text x="420" y="590" font-size="10" fill="#a5f3fc">notes: String</text>
  <text x="420" y="606" font-size="10" fill="#67e8f9">idx: chunk_id</text>

  <!-- ── tts_cache ── -->
  <rect x="30" y="610" width="290" height="130" rx="10" fill="#14532d" filter="url(#sh)"/>
  <rect x="30" y="610" width="290" height="36" rx="10" fill="#166534"/>
  <text x="175" y="634" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">tts_cache</text>
  <line x1="30" y1="646" x2="320" y2="646" stroke="#6ee7b7" stroke-width="1"/>
  <text x="50" y="666" font-size="10" fill="#6ee7b7">🔑 _id: ObjectId</text>
  <text x="50" y="682" font-size="10" fill="#a7f3d0">text_hash: String (unique)</text>
  <text x="50" y="698" font-size="10" fill="#a7f3d0">lang: String</text>
  <text x="50" y="714" font-size="10" fill="#a7f3d0">audio_b64: String</text>
  <text x="50" y="730" font-size="10" fill="#6ee7b7">TTL idx: created_at (7d)</text>

  <!-- ── upload_meta ── -->
  <rect x="400" y="650" width="290" height="130" rx="10" fill="#374151" filter="url(#sh)"/>
  <rect x="400" y="650" width="290" height="36" rx="10" fill="#4b5563"/>
  <text x="545" y="674" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">upload_meta</text>
  <line x1="400" y1="686" x2="690" y2="686" stroke="#d1d5db" stroke-width="1"/>
  <text x="420" y="706" font-size="10" fill="#d1d5db">🔑 _id: ObjectId</text>
  <text x="420" y="722" font-size="10" fill="#e5e7eb">filename: String</text>
  <text x="420" y="738" font-size="10" fill="#e5e7eb">domain: String</text>
  <text x="420" y="754" font-size="10" fill="#e5e7eb">uploader_id: ObjectId → users</text>
  <text x="420" y="770" font-size="10" fill="#d1d5db">idx: domain</text>

  <!-- ── rate_limit_log ── -->
  <rect x="780" y="560" width="290" height="130" rx="10" fill="#0c4a6e" filter="url(#sh)"/>
  <rect x="780" y="560" width="290" height="36" rx="10" fill="#0369a1"/>
  <text x="925" y="584" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">rate_limit_log</text>
  <line x1="780" y1="596" x2="1070" y2="596" stroke="#7dd3fc" stroke-width="1"/>
  <text x="800" y="616" font-size="10" fill="#7dd3fc">🔑 _id: ObjectId</text>
  <text x="800" y="632" font-size="10" fill="#bae6fd">key: String (user/IP)</text>
  <text x="800" y="648" font-size="10" fill="#bae6fd">endpoint: String</text>
  <text x="800" y="664" font-size="10" fill="#bae6fd">count: Number</text>
  <text x="800" y="680" font-size="10" fill="#7dd3fc">TTL idx: window_start (1m)</text>

  <!-- ── RELATIONSHIP LINES ── -->
  <!-- users → chat_sessions -->
  <line x1="400" y1="110" x2="320" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- users → chat_history -->
  <line x1="400" y1="130" x2="320" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- users → refresh_tokens -->
  <line x1="700" y1="110" x2="780" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- users → jti_blacklist -->
  <line x1="700" y1="130" x2="780" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- users → feedback_logs (optional) -->
  <line x1="550" y1="210" x2="550" y2="238" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- users → knowledge_reviews -->
  <line x1="550" y1="210" x2="545" y2="468" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- users → upload_meta -->
  <line x1="550" y1="210" x2="545" y2="648" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- users → admin_logs -->
  <line x1="700" y1="150" x2="780" y2="400" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Chat sessions → history -->
  <line x1="175" y1="190" x2="175" y2="218" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Collection count badge -->
  <rect x="430" y="830" width="240" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="550" y="852" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">14 Collections Total</text>
  <text x="550" y="870" text-anchor="middle" font-size="10" fill="#6b7280">users · chat_sessions · chat_history · refresh_tokens · jti_blacklist</text>
  <text x="550" y="884" text-anchor="middle" font-size="10" fill="#6b7280">feedback_logs · knowledge_gaps · admin_logs · knowledge_reviews · tts_cache · upload_meta · rate_limit_log</text>
</svg>
</body>
</html>
