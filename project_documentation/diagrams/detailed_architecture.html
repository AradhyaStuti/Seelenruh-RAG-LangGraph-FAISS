  <text x="334" y="286" font-size="9" fill="#ede9fe">Nodes: detect_language → load_memory → route_domain</text>
  <text x="334" y="302" font-size="9" fill="#ede9fe">Conditional: → usha | legal | aarogya | raksha sub-graph</text>

  <text x="334" y="334" font-size="9" fill="#ede9fe">stream_run() wraps .stream() → async generator → SSE</text>
  <text x="334" y="350" font-size="9" fill="#ede9fe">fast_mode flag forwarded to all sub-graphs</text>

  <text x="334" y="428" font-size="9" fill="#ede9fe">circuit_breaker.py: CLOSED/OPEN/HALF-OPEN, 5 failures, 30s</text>

  <text x="334" y="524" font-size="9" fill="#ede9fe">utils.py: _kw_score() shared across all 4 agent files</text>

  <text x="334" y="708" font-size="9" fill="#6ee7b7">rate_limit.py: burst_limit() decorator, slowapi integration</text>

  <rect x="706" y="120" width="328" height="210" rx="8" fill="#ea580c" filter="url(#sh)"/>
  <text x="870" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Hybrid RAG (server/rag/)</text>
  <text x="714" y="158" font-size="9" fill="#fed7aa">retriever.py: HybridRetriever class</text>
  <text x="714" y="174" font-size="9" fill="#fed7aa">  embed(query) → float32[384] via e5-small</text>
  <text x="714" y="190" font-size="9" fill="#fed7aa">  store.search(vec, k=20, domain=X)</text>
  <text x="714" y="206" font-size="9" fill="#fed7aa">  bm25.get_top_n(tokens, k=20)</text>
  <text x="714" y="222" font-size="9" fill="#fed7aa">  rrf_merge(dense, sparse, k=60) → top-5</text>
  <text x="714" y="238" font-size="9" fill="#fed7aa">  reranker.predict(pairs) → top-3</text>
  <text x="714" y="254" font-size="9" fill="#fed7aa">  confidence_band(scores) → High/Low/None</text>
  <text x="714" y="274" font-size="9" fill="#fed7aa">store.py: VectorStore</text>
  <text x="714" y="290" font-size="9" fill="#fed7aa">  FAISS IndexFlatIP · L2-normalised vectors</text>
  <text x="714" y="306" font-size="9" fill="#fed7aa">  Soft-delete set → masked at query time</text>
  <text x="714" y="322" font-size="9" fill="#fed7aa">  Atomic save + 5 rolling snapshots</text>

  <text x="714" y="528" font-size="9" fill="#6ee7b7">save_knowledge_gap() if confidence Low/None</text>

  <text x="714" y="656" font-size="9" fill="#fef3c7">3. Anthropic: claude-haiku-4-5 · ANTHROPIC_API_KEY</text>
