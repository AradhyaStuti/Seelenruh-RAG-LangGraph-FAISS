<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State Diagram — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>State Diagram</h1>
<p class="subtitle">States of a user session from arrival to logout, and the ChatState machine during inference</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1020" height="760" viewBox="0 0 1020 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── SESSION STATE MACHINE (left column) ── -->
  <rect x="10" y="10" width="440" height="740" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="230" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">User Session State Machine</text>

  <!-- INITIAL -->
  <circle cx="230" cy="80" r="16" fill="#1f2937"/>
  <line x1="230" y1="96" x2="230" y2="126" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ANONYMOUS -->
  <rect x="130" y="128" width="200" height="56" rx="10" fill="#94a3b8" filter="url(#sh)"/>
  <text x="230" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ANONYMOUS</text>
  <text x="230" y="170" text-anchor="middle" font-size="9" fill="#f1f5f9">no JWT · limited features</text>

  <!-- REGISTERING -->
  <line x1="180" y1="184" x2="120" y2="224" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="118" y="212" font-size="9" fill="#6b7280">register</text>
  <rect x="30" y="226" width="160" height="56" rx="10" fill="#3b82f6" filter="url(#sh)"/>
  <text x="110" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">REGISTERING</text>
  <text x="110" y="268" text-anchor="middle" font-size="9" fill="#bfdbfe">POST /api/auth/register</text>

  <!-- LOGGING IN -->
  <line x1="280" y1="184" x2="340" y2="224" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="216" font-size="9" fill="#6b7280">login</text>
  <rect x="260" y="226" width="160" height="56" rx="10" fill="#6366f1" filter="url(#sh)"/>
  <text x="340" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">LOGGING IN</text>
  <text x="340" y="268" text-anchor="middle" font-size="9" fill="#c7d2fe">POST /api/auth/login</text>

  <!-- AUTHENTICATED -->
  <line x1="110" y1="282" x2="160" y2="342" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="106" y="324" font-size="9" fill="#16a34a">success</text>
  <line x1="340" y1="282" x2="290" y2="342" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="100" y="344" width="260" height="60" rx="10" fill="#16a34a" filter="url(#sh)"/>
  <text x="230" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">AUTHENTICATED</text>
  <text x="230" y="388" text-anchor="middle" font-size="9" fill="#dcfce7">valid access_token · all features</text>

  <!-- TOKEN EXPIRED -->
  <line x1="360" y1="374" x2="400" y2="444" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="400" y="414" font-size="9" fill="#dc2626">token expires</text>
  <rect x="290" y="446" width="150" height="56" rx="10" fill="#ef4444" filter="url(#sh)"/>
  <text x="365" y="470" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">TOKEN EXPIRED</text>
  <text x="365" y="488" text-anchor="middle" font-size="9" fill="#fee2e2">401 on next request</text>

  <!-- REFRESHING -->
  <line x1="290" y1="474" x2="220" y2="524" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="224" y="512" font-size="9" fill="#6b7280">refresh token valid</text>
  <rect x="80" y="526" width="200" height="56" rx="10" fill="#0284c7" filter="url(#sh)"/>
  <text x="180" y="550" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">REFRESHING TOKEN</text>
  <text x="180" y="568" text-anchor="middle" font-size="9" fill="#bae6fd">POST /api/auth/refresh</text>

  <!-- Back to authenticated -->
  <line x1="180" y1="582" x2="190" y2="624" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="100" y="612" font-size="9" fill="#16a34a">new access_token</text>

  <!-- LOGGING OUT -->
  <line x1="230" y1="404" x2="160" y2="444" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="128" y="432" font-size="9" fill="#6b7280">logout</text>
  <rect x="30" y="446" width="200" height="56" rx="10" fill="#475569" filter="url(#sh)"/>
  <text x="130" y="470" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">LOGGING OUT</text>
  <text x="130" y="488" text-anchor="middle" font-size="9" fill="#e2e8f0">POST /api/auth/logout · JTI blacklisted</text>

  <!-- LOGGED OUT -->
  <line x1="130" y1="502" x2="130" y2="624" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="626" width="340" height="60" rx="10" fill="#1f2937" filter="url(#sh)"/>
  <text x="230" y="654" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">LOGGED OUT</text>
  <text x="230" y="672" text-anchor="middle" font-size="9" fill="#9ca3af">tokens revoked · session cleared</text>

  <!-- FINAL -->
  <line x1="230" y1="686" x2="230" y2="718" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="230" cy="730" r="14" fill="#1f2937"/>
  <circle cx="230" cy="730" r="9" fill="#fff"/>

  <!-- ── CHAT STATE MACHINE (right column) ── -->
  <rect x="470" y="10" width="540" height="740" rx="12" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="2"/>
  <text x="740" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">ChatState Machine (per inference call)</text>

  <!-- States list with transition arrows -->
  <circle cx="740" cy="80" r="14" fill="#7c3aed"/>
  <line x1="740" y1="94" x2="740" y2="120" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Each state as rounded box -->
  <!-- Using compact style -->
  <rect x="580" y="122" width="320" height="46" rx="8" fill="#0ea5e9" filter="url(#sh)"/>
  <text x="740" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">LANGUAGE_DETECTED</text>
  <text x="740" y="158" text-anchor="middle" font-size="9" fill="#e0f2fe">lang ∈ {en, hi, hi-roman, de}</text>
  <line x1="740" y1="168" x2="740" y2="194" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="580" y="196" width="320" height="46" rx="8" fill="#0284c7" filter="url(#sh)"/>
  <text x="740" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">MEMORY_LOADED</text>
  <text x="740" y="232" text-anchor="middle" font-size="9" fill="#e0f2fe">history = last 8 turns from MongoDB</text>
  <line x1="740" y1="242" x2="740" y2="268" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="580" y="270" width="320" height="46" rx="8" fill="#7c3aed" filter="url(#sh)"/>
  <text x="740" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">DOMAIN_ROUTED</text>
  <text x="740" y="306" text-anchor="middle" font-size="9" fill="#ede9fe">routed_domain ∈ {Mental Health, Legal, …}</text>
  <line x1="740" y1="316" x2="740" y2="342" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="580" y="344" width="320" height="46" rx="8" fill="#ec4899" filter="url(#sh)"/>
  <text x="740" y="364" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">EMOTION_DETECTED</text>
  <text x="740" y="380" text-anchor="middle" font-size="9" fill="#fce7f3">emotion label logged (Usha sub-graph)</text>
  <line x1="740" y1="390" x2="740" y2="416" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="580" y="418" width="320" height="46" rx="8" fill="#ea580c" filter="url(#sh)"/>
  <text x="740" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CHUNKS_RETRIEVED</text>
  <text x="740" y="454" text-anchor="middle" font-size="9" fill="#fed7aa">retrieved_chunks=[…], confidence=High/Low/None</text>
  <line x1="740" y1="464" x2="740" y2="490" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Conditional branch: web search? -->
  <polygon points="740,492 820,516 740,540 660,516" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
  <text x="740" y="512" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Low/None?</text>
  <line x1="820" y1="516" x2="900" y2="516" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="902" y="502" width="90" height="28" rx="5" fill="#991b1b"/>
  <text x="947" y="520" text-anchor="middle" font-size="9" fill="#fff">WEB_SEARCHED</text>
  <line x1="947" y1="530" x2="800" y2="554" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="740" y1="540" x2="740" y2="564" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="755" y="558" font-size="9" fill="#555">High</text>

  <rect x="580" y="566" width="320" height="46" rx="8" fill="#d97706" filter="url(#sh)"/>
  <text x="740" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">LLM_STREAMING</text>
  <text x="740" y="602" text-anchor="middle" font-size="9" fill="#fef3c7">tokens yielded via async generator</text>
  <line x1="740" y1="612" x2="740" y2="638" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="580" y="640" width="320" height="46" rx="8" fill="#0f766e" filter="url(#sh)"/>
  <text x="740" y="660" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">QUALITY_CHECKED</text>
  <text x="740" y="676" text-anchor="middle" font-size="9" fill="#ccfbf1">hallucination guardrails · confidence validated</text>
  <line x1="740" y1="686" x2="740" y2="712" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="580" y="714" width="320" height="32" rx="8" fill="#1f2937" filter="url(#sh)"/>
  <text x="740" y="734" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">COMPLETE  →  memory saved · SSE [DONE]</text>
</svg>
</body>
</html>
