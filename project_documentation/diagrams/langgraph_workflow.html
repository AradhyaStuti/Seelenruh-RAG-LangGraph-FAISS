<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangGraph Workflow — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>LangGraph Workflow</h1>
<p class="subtitle">Node-by-node state transitions from query ingestion to streamed SSE chunks</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1040" height="860" viewBox="0 0 1040 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-p" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#7c3aed"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- MAIN GRAPH BACKGROUND -->
  <rect x="10" y="10" width="1020" height="840" rx="14" fill="#fafafa" stroke="#e5e7eb" stroke-width="2"/>
  <text x="30" y="36" font-size="12" font-weight="700" fill="#6b7280" letter-spacing="1">graph.py  ·  ChatState (TypedDict)</text>

  <!-- ── NODE 1: START / query_in ── -->
  <ellipse cx="520" cy="80" rx="70" ry="28" fill="#1f2937" filter="url(#sh)"/>
  <text x="520" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">START</text>

  <line x1="520" y1="108" x2="520" y2="136" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── NODE 2: detect_language ── -->
  <rect x="390" y="138" width="260" height="56" rx="10" fill="#0ea5e9" filter="url(#sh)"/>
  <text x="520" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">detect_language</text>
  <text x="520" y="180" text-anchor="middle" font-size="10" fill="#e0f2fe">Devanagari → hi · Hinglish → hi-roman · else en/de</text>

  <line x1="520" y1="194" x2="520" y2="222" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── NODE 3: load_memory ── -->
  <rect x="390" y="224" width="260" height="56" rx="10" fill="#0284c7" filter="url(#sh)"/>
  <text x="520" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">load_memory</text>
  <text x="520" y="266" text-anchor="middle" font-size="10" fill="#e0f2fe">Fetch last N turns from MongoDB · build context window</text>

  <line x1="520" y1="280" x2="520" y2="308" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── NODE 4: route_domain ── -->
  <rect x="390" y="310" width="260" height="56" rx="10" fill="#7c3aed" filter="url(#sh)"/>
  <text x="520" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">route_domain</text>
  <text x="520" y="352" text-anchor="middle" font-size="10" fill="#ede9fe">keyword heuristic → confirmed domain → ChatState.routed_domain</text>

  <!-- CONDITIONAL BRANCH arrows from route_domain -->
  <line x1="390" y1="338" x2="210" y2="420" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-p)"/>
  <line x1="450" y1="366" x2="350" y2="420" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-p)"/>
  <line x1="590" y1="366" x2="690" y2="420" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-p)"/>
  <line x1="650" y1="338" x2="830" y2="420" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-p)"/>

  <!-- Branch labels -->
  <text x="275" y="395" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">Mental Health</text>
  <text x="400" y="412" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">Legal</text>
  <text x="680" y="412" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">Govt Schemes</text>
  <text x="780" y="395" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">Safety</text>

  <!-- ── 4 Sub-graph Boxes ── -->
  <!-- USHA (Mental Health) -->
  <rect x="60" y="422" width="210" height="130" rx="10" fill="#ec4899" filter="url(#sh)"/>
  <text x="165" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Usha Sub-graph</text>
  <text x="165" y="466" text-anchor="middle" font-size="10" fill="#fce7f3">usha_graph.py</text>
  <line x1="60" y1="478" x2="270" y2="478" stroke="#fce7f3" stroke-width="1"/>
  <text x="165" y="496" text-anchor="middle" font-size="9" fill="#fce7f3">emotion_detect → retrieve</text>
  <text x="165" y="510" text-anchor="middle" font-size="9" fill="#fce7f3">→ web_fallback? → build_prompt</text>
  <text x="165" y="524" text-anchor="middle" font-size="9" fill="#fce7f3">→ call_llm → safety_check</text>
  <text x="165" y="538" text-anchor="middle" font-size="9" fill="#fce7f3">→ stream_tokens</text>

  <!-- UMANG (Legal) -->
  <rect x="290" y="422" width="210" height="130" rx="10" fill="#f59e0b" filter="url(#sh)"/>
  <text x="395" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Umang Sub-graph</text>
  <text x="395" y="466" text-anchor="middle" font-size="10" fill="#fef3c7">legal_graph.py</text>
  <line x1="290" y1="478" x2="500" y2="478" stroke="#fef3c7" stroke-width="1"/>
  <text x="395" y="496" text-anchor="middle" font-size="9" fill="#fef3c7">case_classify → retrieve</text>
  <text x="395" y="510" text-anchor="middle" font-size="9" fill="#fef3c7">→ web_fallback? → build_prompt</text>
  <text x="395" y="524" text-anchor="middle" font-size="9" fill="#fef3c7">→ call_llm → timeline_extract</text>
  <text x="395" y="538" text-anchor="middle" font-size="9" fill="#fef3c7">→ stream_tokens</text>

  <!-- AAROGYA (Govt) -->
  <rect x="520" y="422" width="210" height="130" rx="10" fill="#10b981" filter="url(#sh)"/>
  <text x="625" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Aarogya Sub-graph</text>
  <text x="625" y="466" text-anchor="middle" font-size="10" fill="#d1fae5">aarogya_graph.py</text>
  <line x1="520" y1="478" x2="730" y2="478" stroke="#d1fae5" stroke-width="1"/>
  <text x="625" y="496" text-anchor="middle" font-size="9" fill="#d1fae5">eligibility_check → retrieve</text>
  <text x="625" y="510" text-anchor="middle" font-size="9" fill="#d1fae5">→ web_fallback? → build_prompt</text>
  <text x="625" y="524" text-anchor="middle" font-size="9" fill="#d1fae5">→ call_llm → scheme_format</text>
  <text x="625" y="538" text-anchor="middle" font-size="9" fill="#d1fae5">→ stream_tokens</text>

  <!-- RAKSHA (Safety) -->
  <rect x="750" y="422" width="210" height="130" rx="10" fill="#ef4444" filter="url(#sh)"/>
  <text x="855" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Raksha Sub-graph</text>
  <text x="855" y="466" text-anchor="middle" font-size="10" fill="#fee2e2">raksha_graph.py</text>
  <line x1="750" y1="478" x2="960" y2="478" stroke="#fee2e2" stroke-width="1"/>
  <text x="855" y="496" text-anchor="middle" font-size="9" fill="#fee2e2">threat_detect → retrieve</text>
  <text x="855" y="510" text-anchor="middle" font-size="9" fill="#fee2e2">→ web_fallback? → build_prompt</text>
  <text x="855" y="524" text-anchor="middle" font-size="9" fill="#fee2e2">→ call_llm → emergency_check</text>
  <text x="855" y="538" text-anchor="middle" font-size="9" fill="#fee2e2">→ stream_tokens</text>

  <!-- ARROWS: sub-graphs → merge ── -->
  <line x1="165" y1="552" x2="430" y2="610" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="395" y1="552" x2="470" y2="610" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="625" y1="552" x2="560" y2="610" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="855" y1="552" x2="610" y2="610" stroke="#888" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ── NODE 5: quality_check ── -->
  <rect x="360" y="612" width="300" height="56" rx="10" fill="#0f766e" filter="url(#sh)"/>
  <text x="510" y="636" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">quality_check</text>
  <text x="510" y="654" text-anchor="middle" font-size="10" fill="#ccfbf1">QualityChecker · hallucination guardrails · confidence score</text>

  <line x1="510" y1="668" x2="510" y2="696" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── NODE 6: save_memory ── -->
  <rect x="360" y="698" width="300" height="56" rx="10" fill="#0369a1" filter="url(#sh)"/>
  <text x="510" y="722" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">save_memory</text>
  <text x="510" y="740" text-anchor="middle" font-size="10" fill="#e0f2fe">Persist turn to MongoDB · update session state</text>

  <line x1="510" y1="754" x2="510" y2="782" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── NODE 7: END ── -->
  <ellipse cx="510" cy="810" rx="70" ry="28" fill="#1f2937" filter="url(#sh)"/>
  <text x="510" y="815" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">END (SSE)</text>

  <!-- STATE INFO box -->
  <rect x="770" y="620" width="240" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="890" y="642" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">ChatState keys</text>
  <line x1="770" y1="650" x2="1010" y2="650" stroke="#e5e7eb" stroke-width="1"/>
  <text x="786" y="668" font-size="9" fill="#6b7280">query, domain, history, lang</text>
  <text x="786" y="684" font-size="9" fill="#6b7280">user_id, session_id, fast_mode</text>
  <text x="786" y="700" font-size="9" fill="#6b7280">routed_domain, emotion</text>
  <text x="786" y="716" font-size="9" fill="#6b7280">retrieved_chunks, confidence</text>
  <text x="786" y="732" font-size="9" fill="#6b7280">response, streaming_tokens</text>
  <text x="786" y="748" font-size="9" fill="#6b7280">web_used, knowledge_gap</text>
  <text x="786" y="764" font-size="9" fill="#6b7280">quality_score, hallucination_flag</text>
</svg>
</body>
</html>
