<style>

<body>
<h1>Package Diagram</h1>
<p class="subtitle">Module dependency graph — which packages import from which</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

  <text x="610" y="474" font-size="10" fill="#374151">rate_limit.py</text>
