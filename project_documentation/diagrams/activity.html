<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Diagram — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Activity Diagram — Admin Knowledge Management</h1>
<p class="subtitle">Admin workflow for adding, reviewing, and removing knowledge base entries</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="980" height="900" viewBox="0 0 980 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#16a34a"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- SWIMLANE HEADERS -->
  <rect x="10" y="10" width="310" height="880" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="165" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">ADMIN (Browser)</text>

  <rect x="330" y="10" width="320" height="880" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="490" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">FastAPI (Admin Routes)</text>

  <rect x="660" y="10" width="310" height="880" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="815" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">FAISS / MongoDB</text>

  <!-- START -->
  <circle cx="490" cy="70" r="16" fill="#1f2937"/>
  <line x1="490" y1="86" x2="490" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 1. Admin opens KnowledgeBase page -->
  <rect x="30" y="112" width="260" height="46" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="160" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Open KnowledgeBase Page</text>
  <text x="160" y="148" text-anchor="middle" font-size="9" fill="#bfdbfe">Admin Panel → KnowledgeBase.jsx</text>
  <line x1="290" y1="135" x2="348" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. GET /api/admin/knowledge -->
  <rect x="350" y="112" width="280" height="46" rx="8" fill="#22c55e" filter="url(#sh)"/>
  <text x="490" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">GET /api/admin/knowledge</text>
  <text x="490" y="148" text-anchor="middle" font-size="9" fill="#dcfce7">X-Admin-Key · domain filter optional</text>
  <line x1="630" y1="135" x2="668" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Fetch from FAISS meta -->
  <rect x="670" y="112" width="290" height="46" rx="8" fill="#ea580c" filter="url(#sh)"/>
  <text x="815" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Read store.meta[]</text>
  <text x="815" y="148" text-anchor="middle" font-size="9" fill="#fed7aa">return chunk list (id, text, domain, topic)</text>
  <line x1="815" y1="158" x2="490" y2="158" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Chunks displayed -->
  <line x1="350" y1="158" x2="160" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="30" y="202" width="260" height="36" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="160" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Display chunk list + gaps</text>

  <line x1="160" y1="238" x2="160" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision: what action? -->
  <polygon points="160,270 280,300 160,330 40,300" fill="#fef9c3" stroke="#d97706" stroke-width="2"/>
  <text x="160" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Admin</text>
  <text x="160" y="310" text-anchor="middle" font-size="10" fill="#92400e">action?</text>

  <!-- Branch 1: Add chunk -->
  <line x1="160" y1="330" x2="160" y2="370" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="176" y="358" font-size="9" fill="#16a34a">Add chunk</text>

  <rect x="30" y="372" width="260" height="46" rx="8" fill="#16a34a" filter="url(#sh)"/>
  <text x="160" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Fill chunk form</text>
  <text x="160" y="408" text-anchor="middle" font-size="9" fill="#dcfce7">topic, text, domain, source</text>
  <line x1="290" y1="395" x2="348" y2="395" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="350" y="372" width="280" height="46" rx="8" fill="#22c55e" filter="url(#sh)"/>
  <text x="490" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">POST /api/admin/knowledge</text>
  <text x="490" y="408" text-anchor="middle" font-size="9" fill="#dcfce7">validate fields · generate chunk ID</text>
  <line x1="630" y1="395" x2="668" y2="395" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="670" y="372" width="290" height="60" rx="8" fill="#ea580c" filter="url(#sh)"/>
  <text x="815" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">embed + add to FAISS</text>
  <text x="815" y="410" text-anchor="middle" font-size="9" fill="#fed7aa">e5-small encode(topic + text)</text>
  <text x="815" y="424" text-anchor="middle" font-size="9" fill="#fed7aa">store.add_items() + BM25 reindex</text>

  <!-- Branch 2: Delete chunk -->
  <line x1="280" y1="300" x2="490" y2="460" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="420" y="380" font-size="9" fill="#dc2626">Delete</text>

  <rect x="350" y="462" width="280" height="60" rx="8" fill="#dc2626" filter="url(#sh)"/>
  <text x="490" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">DELETE /knowledge/{id}</text>
  <text x="490" y="503" text-anchor="middle" font-size="9" fill="#fee2e2">X-Admin-Key · confirm id</text>
  <text x="490" y="518" text-anchor="middle" font-size="9" fill="#fee2e2">check should_compact(threshold=0.30)</text>
  <line x1="630" y1="492" x2="668" y2="492" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="670" y="462" width="290" height="60" rx="8" fill="#9a3412" filter="url(#sh)"/>
  <text x="815" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">soft-delete or compact</text>
  <text x="815" y="504" text-anchor="middle" font-size="9" fill="#fed7aa">store.delete_chunks([id]) → deleted.json</text>
  <text x="815" y="518" text-anchor="middle" font-size="9" fill="#fed7aa">if &gt;30% deleted → store.rebuild()</text>

  <!-- Branch 3: Rollback -->
  <line x1="40" y1="300" x2="160" y2="560" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="42" y="432" font-size="9" fill="#7c3aed">Rollback</text>

  <rect x="30" y="562" width="260" height="46" rx="8" fill="#7c3aed" filter="url(#sh)"/>
  <text x="160" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Select snapshot step</text>
  <text x="160" y="598" text-anchor="middle" font-size="9" fill="#ede9fe">1..5 (1 = most recent)</text>
  <line x1="290" y1="585" x2="348" y2="585" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="350" y="562" width="280" height="46" rx="8" fill="#6d28d9" filter="url(#sh)"/>
  <text x="490" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">POST /knowledge/rollback</text>
  <text x="490" y="598" text-anchor="middle" font-size="9" fill="#ede9fe">{ steps: N }</text>
  <line x1="630" y1="585" x2="668" y2="585" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="670" y="562" width="290" height="60" rx="8" fill="#4c1d95" filter="url(#sh)"/>
  <text x="815" y="584" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">restore snapshot</text>
  <text x="815" y="602" text-anchor="middle" font-size="9" fill="#ddd6fe">copy snapshots/N/faiss.index → live</text>
  <text x="815" y="616" text-anchor="middle" font-size="9" fill="#ddd6fe">reload store.load() → confirm</text>

  <!-- Merge / Confirm -->
  <line x1="490" y1="532" x2="490" y2="648" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="815" y1="532" x2="815" y2="648" stroke="#555" stroke-width="1.5"/>
  <line x1="815" y1="648" x2="490" y2="648" stroke="#555" stroke-width="1.5"/>
  <line x1="815" y1="622" x2="815" y2="648" stroke="#555" stroke-width="1.5"/>

  <rect x="350" y="650" width="280" height="46" rx="8" fill="#0f766e" filter="url(#sh)"/>
  <text x="490" y="670" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Return 200 OK + updated state</text>
  <text x="490" y="686" text-anchor="middle" font-size="9" fill="#ccfbf1">log action to admin_logs</text>
  <line x1="350" y1="673" x2="292" y2="673" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="650" width="260" height="46" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="160" y="670" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Refresh UI</text>
  <text x="160" y="686" text-anchor="middle" font-size="9" fill="#bfdbfe">toast notification · list reloaded</text>

  <line x1="160" y1="696" x2="160" y2="730" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- END -->
  <circle cx="490" cy="800" r="16" fill="#1f2937" filter="url(#sh)"/>
  <circle cx="490" cy="800" r="10" fill="#fff"/>
  <line x1="160" y1="730" x2="474" y2="800" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
</body>
</html>
