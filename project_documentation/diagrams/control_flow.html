<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Flow Diagram — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Control Flow Diagram</h1>
<p class="subtitle">Execution path through the LangGraph node pipeline showing branches and loops</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="900" height="920" viewBox="0 0 900 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#16a34a"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- START -->
  <ellipse cx="450" cy="36" rx="70" ry="24" fill="#1f2937"/>
  <text x="450" y="41" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">START</text>

  <line x1="450" y1="60" x2="450" y2="88" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- N1: detect_language -->
  <rect x="300" y="90" width="300" height="46" rx="8" fill="#0ea5e9" filter="url(#sh)"/>
  <text x="450" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">N1: detect_language(state)</text>
  <text x="450" y="126" text-anchor="middle" font-size="9" fill="#e0f2fe">sets state["lang"]</text>
  <line x1="450" y1="136" x2="450" y2="164" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- N2: load_memory -->
  <rect x="300" y="166" width="300" height="46" rx="8" fill="#0284c7" filter="url(#sh)"/>
  <text x="450" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">N2: load_memory(state)</text>
  <text x="450" y="202" text-anchor="middle" font-size="9" fill="#e0f2fe">await db.fetch_chat_history()</text>
  <line x1="450" y1="212" x2="450" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- N3: route_domain (conditional edge) -->
  <rect x="300" y="242" width="300" height="56" rx="8" fill="#7c3aed" filter="url(#sh)"/>
  <text x="450" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">N3: route_domain(state)</text>
  <text x="450" y="280" text-anchor="middle" font-size="9" fill="#ede9fe">sets state["routed_domain"]</text>
  <text x="450" y="294" text-anchor="middle" font-size="9" fill="#ede9fe">→ CONDITIONAL EDGE</text>

  <!-- 4-way branch -->
  <line x1="360" y1="298" x2="140" y2="358" stroke="#ec4899" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="215" y="336" font-size="9" fill="#ec4899">Mental Health</text>
  <line x1="420" y1="298" x2="330" y2="358" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="356" y="336" font-size="9" fill="#f59e0b">Legal</text>
  <line x1="480" y1="298" x2="570" y2="358" stroke="#10b981" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="538" y="336" font-size="9" fill="#10b981">Govt</text>
  <line x1="540" y1="298" x2="760" y2="358" stroke="#ef4444" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="680" y="336" font-size="9" fill="#ef4444">Safety</text>

  <!-- 4 sub-graph boxes (N4a-d) -->
  <rect x="30" y="360" width="180" height="60" rx="7" fill="#ec4899" filter="url(#sh)"/>
  <text x="120" y="384" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">N4a: usha_graph.run()</text>
  <text x="120" y="400" text-anchor="middle" font-size="9" fill="#fce7f3">emotion→retrieve→build→llm→safety</text>

  <rect x="230" y="360" width="180" height="60" rx="7" fill="#f59e0b" filter="url(#sh)"/>
  <text x="320" y="384" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">N4b: legal_graph.run()</text>
  <text x="320" y="400" text-anchor="middle" font-size="9" fill="#fef3c7">classify→retrieve→build→llm→timeline</text>

  <rect x="430" y="360" width="180" height="60" rx="7" fill="#10b981" filter="url(#sh)"/>
  <text x="520" y="384" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">N4c: aarogya_graph.run()</text>
  <text x="520" y="400" text-anchor="middle" font-size="9" fill="#d1fae5">check→retrieve→build→llm→format</text>

  <rect x="630" y="360" width="230" height="60" rx="7" fill="#ef4444" filter="url(#sh)"/>
  <text x="745" y="384" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">N4d: raksha_graph.run()</text>
  <text x="745" y="400" text-anchor="middle" font-size="9" fill="#fee2e2">threat→retrieve→build→llm→emergency</text>

  <!-- All merge -->
  <line x1="120" y1="420" x2="400" y2="478" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="420" x2="430" y2="478" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="420" x2="470" y2="478" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="745" y1="420" x2="500" y2="478" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- N5: quality_check -->
  <rect x="300" y="480" width="300" height="56" rx="8" fill="#0f766e" filter="url(#sh)"/>
  <text x="450" y="504" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">N5: quality_check(state)</text>
  <text x="450" y="520" text-anchor="middle" font-size="9" fill="#ccfbf1">hallucination_guardrails · confidence · quality_score</text>

  <line x1="450" y1="536" x2="450" y2="564" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: quality ok? -->
  <polygon points="450,566 570,596 450,626 330,596" fill="#fef9c3" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="592" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">quality_ok?</text>
  <text x="450" y="608" text-anchor="middle" font-size="9" fill="#92400e">or retry limit?</text>

  <!-- NO: retry path -->
  <line x1="570" y1="596" x2="700" y2="596" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="635" y="590" font-size="9" fill="#dc2626">FAIL (rare)</text>
  <rect x="702" y="576" width="160" height="40" rx="7" fill="#7f1d1d" filter="url(#sh)"/>
  <text x="782" y="596" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">flag + log</text>
  <text x="782" y="608" text-anchor="middle" font-size="9" fill="#fecaca">continue anyway</text>
  <line x1="782" y1="616" x2="520" y2="636" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- YES: continue -->
  <line x1="450" y1="626" x2="450" y2="648" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="466" y="642" font-size="9" fill="#16a34a">OK</text>

  <!-- N6: stream_tokens -->
  <rect x="300" y="650" width="300" height="56" rx="8" fill="#16a34a" filter="url(#sh)"/>
  <text x="450" y="674" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">N6: stream_tokens(state)</text>
  <text x="450" y="690" text-anchor="middle" font-size="9" fill="#dcfce7">async generator yield per token → SSE</text>

  <line x1="450" y1="706" x2="450" y2="734" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- N7: save_memory -->
  <rect x="300" y="736" width="300" height="46" rx="8" fill="#0369a1" filter="url(#sh)"/>
  <text x="450" y="756" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">N7: save_memory(state)</text>
  <text x="450" y="772" text-anchor="middle" font-size="9" fill="#e0f2fe">chat_history.insert · knowledge_gap if needed</text>

  <line x1="450" y1="782" x2="450" y2="810" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- END -->
  <ellipse cx="450" cy="824" rx="70" ry="24" fill="#1f2937"/>
  <text x="450" y="829" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">END  (SSE done)</text>

  <!-- Concurrency note -->
  <rect x="10" y="480" width="270" height="80" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="145" y="504" text-anchor="middle" font-size="10" font-weight="700" fill="#7e22ce">Async execution notes</text>
  <text x="26" y="522" font-size="9" fill="#6b7280">• All I/O is async (await db.*, await llm.*)</text>
  <text x="26" y="538" font-size="9" fill="#6b7280">• LLM call is async generator (astream)</text>
  <text x="26" y="554" font-size="9" fill="#6b7280">• Web search: asyncio.gather() concurrent</text>
</svg>
</body>
</html>
