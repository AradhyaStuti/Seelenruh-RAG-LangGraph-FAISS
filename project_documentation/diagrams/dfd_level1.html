<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFD Level 1 — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Data Flow Diagram — Level 1</h1>
<p class="subtitle">Decomposed view of the 5 major sub-processes and their data stores</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="1060" height="800" viewBox="0 0 1060 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- External Entities -->
  <rect x="10" y="340" width="110" height="60" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="65" y="366" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">User</text>
  <text x="65" y="382" text-anchor="middle" font-size="9" fill="#9ca3af">End User</text>

  <rect x="940" y="80" width="110" height="60" rx="4" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="995" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Admin</text>

  <rect x="940" y="340" width="110" height="60" rx="4" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="995" y="366" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">LLM APIs</text>
  <text x="995" y="382" text-anchor="middle" font-size="9" fill="#fef3c7">Groq/Ollama/HK</text>

  <rect x="940" y="560" width="110" height="60" rx="4" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
  <text x="995" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Web Search</text>

  <!-- DATA STORES (open rectangles) -->
  <!-- D1: chat_history -->
  <line x1="200" y1="720" x2="480" y2="720" stroke="#374151" stroke-width="2"/>
  <line x1="200" y1="740" x2="480" y2="740" stroke="#374151" stroke-width="2"/>
  <line x1="200" y1="720" x2="200" y2="740" stroke="#374151" stroke-width="2"/>
  <text x="220" y="734" font-size="10" font-weight="600" fill="#374151">D1  chat_history</text>

  <!-- D2: knowledge base / FAISS -->
  <line x1="540" y1="720" x2="820" y2="720" stroke="#374151" stroke-width="2"/>
  <line x1="540" y1="740" x2="820" y2="740" stroke="#374151" stroke-width="2"/>
  <line x1="540" y1="720" x2="540" y2="740" stroke="#374151" stroke-width="2"/>
  <text x="560" y="734" font-size="10" font-weight="600" fill="#374151">D2  knowledge_base / FAISS</text>

  <!-- D3: feedback_logs -->
  <line x1="200" y1="620" x2="440" y2="620" stroke="#374151" stroke-width="2"/>
  <line x1="200" y1="640" x2="440" y2="640" stroke="#374151" stroke-width="2"/>
  <line x1="200" y1="620" x2="200" y2="640" stroke="#374151" stroke-width="2"/>
  <text x="220" y="634" font-size="10" font-weight="600" fill="#374151">D3  feedback_logs</text>

  <!-- D4: knowledge_gaps -->
  <line x1="540" y1="620" x2="820" y2="620" stroke="#374151" stroke-width="2"/>
  <line x1="540" y1="640" x2="820" y2="640" stroke="#374151" stroke-width="2"/>
  <line x1="540" y1="620" x2="540" y2="640" stroke="#374151" stroke-width="2"/>
  <text x="560" y="634" font-size="10" font-weight="600" fill="#374151">D4  knowledge_gaps</text>

  <!-- ── PROCESS BUBBLES ── -->
  <!-- P1: Auth & Rate Limit -->
  <circle cx="260" cy="110" r="70" fill="#dc2626" stroke="#b91c1c" stroke-width="2" filter="url(#sh)"/>
  <text x="260" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">P1</text>
  <text x="260" y="118" text-anchor="middle" font-size="10" fill="#fecaca">Auth &amp;</text>
  <text x="260" y="134" text-anchor="middle" font-size="10" fill="#fecaca">Rate Limit</text>

  <!-- P2: Language & Domain Routing -->
  <circle cx="530" cy="110" r="70" fill="#7c3aed" stroke="#6d28d9" stroke-width="2" filter="url(#sh)"/>
  <text x="530" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">P2</text>
  <text x="530" y="118" text-anchor="middle" font-size="10" fill="#ede9fe">Language &amp;</text>
  <text x="530" y="134" text-anchor="middle" font-size="10" fill="#ede9fe">Domain Route</text>

  <!-- P3: RAG Pipeline -->
  <circle cx="260" cy="380" r="80" fill="#ea580c" stroke="#c2410c" stroke-width="2" filter="url(#sh)"/>
  <text x="260" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">P3</text>
  <text x="260" y="386" text-anchor="middle" font-size="10" fill="#fed7aa">RAG</text>
  <text x="260" y="402" text-anchor="middle" font-size="10" fill="#fed7aa">Pipeline</text>

  <!-- P4: LLM Generation -->
  <circle cx="660" cy="380" r="80" fill="#d97706" stroke="#b45309" stroke-width="2" filter="url(#sh)"/>
  <text x="660" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">P4</text>
  <text x="660" y="386" text-anchor="middle" font-size="10" fill="#fef3c7">LLM</text>
  <text x="660" y="402" text-anchor="middle" font-size="10" fill="#fef3c7">Generation</text>

  <!-- P5: Feedback & Logging -->
  <circle cx="460" cy="530" r="65" fill="#0f766e" stroke="#0d9488" stroke-width="2" filter="url(#sh)"/>
  <text x="460" y="522" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">P5</text>
  <text x="460" y="540" text-anchor="middle" font-size="10" fill="#ccfbf1">Feedback &amp;</text>
  <text x="460" y="556" text-anchor="middle" font-size="10" fill="#ccfbf1">Logging</text>

  <!-- ── DATA FLOWS ── -->
  <!-- User → P1 -->
  <line x1="120" y1="370" x2="200" y2="260" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="142" y="308" font-size="9" fill="#6b7280">query + JWT</text>

  <!-- P1 → P2 -->
  <line x1="330" y1="110" x2="458" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="394" y="104" text-anchor="middle" font-size="9" fill="#6b7280">validated request</text>

  <!-- P2 → P3 -->
  <line x1="470" y1="160" x2="310" y2="302" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="374" y="218" text-anchor="middle" font-size="9" fill="#6b7280">routed query + lang</text>

  <!-- P2 → P4 -->
  <line x1="590" y1="160" x2="620" y2="302" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- P3 → P4 (chunks) -->
  <line x1="340" y1="380" x2="578" y2="380" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="460" y="374" text-anchor="middle" font-size="9" fill="#6b7280">top-3 chunks + confidence</text>

  <!-- P4 → LLM APIs -->
  <line x1="740" y1="380" x2="938" y2="370" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="840" y="368" text-anchor="middle" font-size="9" fill="#d97706">prompt messages</text>

  <!-- LLM APIs → P4 -->
  <line x1="938" y1="390" x2="740" y2="400" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="840" y="406" text-anchor="middle" font-size="9" fill="#fbbf24">token stream</text>

  <!-- P4 → Web Search (conditional) -->
  <line x1="720" y1="430" x2="940" y2="572" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="845" y="510" text-anchor="middle" font-size="9" fill="#6b7280">search query (low conf)</text>

  <!-- Web Search → P4 -->
  <line x1="940" y1="592" x2="720" y2="450" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="828" y="554" text-anchor="middle" font-size="9" fill="#94a3b8">web results</text>

  <!-- P4 → User (response) -->
  <line x1="580" y1="420" x2="128" y2="400" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="448" text-anchor="middle" font-size="9" fill="#16a34a">SSE streamed response</text>

  <!-- P4 → P5 -->
  <line x1="620" y1="444" x2="516" y2="476" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="586" y="466" text-anchor="middle" font-size="9" fill="#6b7280">full turn</text>

  <!-- P5 ↔ D3 (feedback_logs) -->
  <line x1="400" y1="560" x2="340" y2="620" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="348" y="600" font-size="9" fill="#6b7280">write vote</text>

  <!-- P5 ↔ D4 (knowledge_gaps) -->
  <line x1="520" y1="560" x2="580" y2="620" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="572" y="600" font-size="9" fill="#6b7280">write gap</text>

  <!-- P3 ↔ D2 (knowledge base) -->
  <line x1="310" y1="450" x2="560" y2="720" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="402" y="590" font-size="9" fill="#6b7280">search FAISS+BM25</text>

  <!-- P1 ↔ D1 (chat history) -->
  <line x1="260" y1="460" x2="310" y2="720" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Admin ↔ D2 -->
  <line x1="940" y1="110" x2="820" y2="730" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="890" y="420" font-size="9" fill="#7c3aed">manage KB</text>

  <!-- User → P5 (feedback vote) -->
  <line x1="120" y1="400" x2="400" y2="514" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="230" y="474" font-size="9" fill="#ea580c">vote up/down</text>
</svg>
</body>
</html>
