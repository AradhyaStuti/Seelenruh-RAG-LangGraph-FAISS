<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Gap Detection — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Knowledge Gap Detection Workflow</h1>
<p class="subtitle">Automatic identification of topics the knowledge base cannot confidently answer</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="900" height="820" viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#16a34a"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Step 1: Query arrives -->
  <rect x="300" y="20" width="300" height="60" rx="10" fill="#1f2937" filter="url(#sh)"/>
  <text x="450" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Query Enters Pipeline</text>
  <text x="450" y="66" text-anchor="middle" font-size="10" fill="#9ca3af">domain routed · language detected</text>

  <line x1="450" y1="80" x2="450" y2="120" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: RAG retrieval -->
  <rect x="270" y="122" width="360" height="70" rx="10" fill="#ea580c" filter="url(#sh)"/>
  <text x="450" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">RAG Retrieval</text>
  <text x="450" y="166" text-anchor="middle" font-size="10" fill="#fed7aa">FAISS + BM25 + RRF + Cross-Encoder</text>
  <text x="450" y="180" text-anchor="middle" font-size="9" fill="#fed7aa">top-3 chunks returned with reranker scores</text>

  <line x1="450" y1="192" x2="450" y2="232" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Confidence computation -->
  <rect x="270" y="234" width="360" height="80" rx="10" fill="#7c3aed" filter="url(#sh)"/>
  <text x="450" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Confidence Band</text>
  <text x="286" y="282" font-size="10" fill="#ddd6fe">High:  reranker score ≥ 0.6 · ≥ 2 chunks retrieved</text>
  <text x="286" y="298" font-size="10" fill="#ddd6fe">Low:   score 0.3–0.6 · only 1 chunk</text>
  <text x="286" y="314" font-size="10" fill="#ddd6fe">None:  score &lt; 0.3 · 0 chunks</text>

  <!-- Diamond decision -->
  <line x1="450" y1="314" x2="450" y2="354" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="450,356 530,396 450,436 370,396" fill="#fef9c3" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="392" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">confidence</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#92400e">== Low or None?</text>

  <!-- YES path -->
  <line x1="370" y1="396" x2="130" y2="396" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="250" y="388" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">YES</text>

  <!-- NO path -->
  <line x1="530" y1="396" x2="770" y2="396" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="650" y="388" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">NO</text>

  <!-- YES branch: web search -->
  <rect x="20" y="362" width="220" height="70" rx="10" fill="#dc2626" filter="url(#sh)"/>
  <text x="130" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Web Search Fallback</text>
  <text x="130" y="404" text-anchor="middle" font-size="9" fill="#fee2e2">DuckDuckGo + Wikipedia</text>
  <text x="130" y="418" text-anchor="middle" font-size="9" fill="#fee2e2">+ Brave Search (concurrent)</text>

  <line x1="130" y1="432" x2="130" y2="472" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Log knowledge gap -->
  <rect x="20" y="474" width="220" height="80" rx="10" fill="#1e1b4b" filter="url(#sh)"/>
  <text x="130" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Log Knowledge Gap</text>
  <text x="130" y="518" text-anchor="middle" font-size="9" fill="#c7d2fe">knowledge_gaps.insert_one({</text>
  <text x="130" y="532" text-anchor="middle" font-size="9" fill="#c7d2fe">  query, domain, confidence,</text>
  <text x="130" y="546" text-anchor="middle" font-size="9" fill="#c7d2fe">  session_id, created_at})</text>

  <line x1="130" y1="554" x2="130" y2="594" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Web results included -->
  <rect x="20" y="596" width="220" height="60" rx="10" fill="#374151" filter="url(#sh)"/>
  <text x="130" y="622" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Web results injected</text>
  <text x="130" y="638" text-anchor="middle" font-size="9" fill="#d1d5db">into LLM prompt as context</text>

  <!-- NO branch: normal flow -->
  <rect x="680" y="362" width="220" height="70" rx="10" fill="#16a34a" filter="url(#sh)"/>
  <text x="790" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Normal LLM Call</text>
  <text x="790" y="404" text-anchor="middle" font-size="9" fill="#d1fae5">chunks → prompt → stream</text>
  <text x="790" y="418" text-anchor="middle" font-size="9" fill="#d1fae5">no gap logged</text>

  <!-- Merge both paths -->
  <line x1="130" y1="656" x2="370" y2="710" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="790" y1="432" x2="530" y2="710" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- LLM response -->
  <rect x="240" y="712" width="420" height="60" rx="10" fill="#0f172a" filter="url(#sh)"/>
  <text x="450" y="740" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">LLM Response (streamed to user)</text>
  <text x="450" y="758" text-anchor="middle" font-size="10" fill="#94a3b8">confidence band shown in ExplainabilityPanel</text>

  <!-- Admin reads gaps -->
  <rect x="580" y="474" width="300" height="130" rx="10" fill="#fef9c3" stroke="#fde68a" stroke-width="2"/>
  <text x="730" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Admin KnowledgeGaps Page</text>
  <line x1="580" y1="508" x2="880" y2="508" stroke="#fde68a" stroke-width="1"/>
  <text x="596" y="528" font-size="10" fill="#78350f">GET /api/admin/knowledge-gaps</text>
  <text x="596" y="546" font-size="10" fill="#78350f">Groups gaps by domain</text>
  <text x="596" y="562" font-size="10" fill="#78350f">Shows top unanswered queries</text>
  <text x="596" y="578" font-size="10" fill="#78350f">Admin can add chunks to KB</text>
  <text x="596" y="594" font-size="10" fill="#78350f">Admin can delete gap records</text>

  <!-- Arrow: gap log → admin page -->
  <line x1="240" y1="514" x2="578" y2="514" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="410" y="510" text-anchor="middle" font-size="9" fill="#d97706">bubbles up to admin</text>
</svg>
</body>
</html>
