<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Flow — Seelenruh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1a1a2e; }
  h1 { text-align: center; padding: 28px 0 6px; font-size: 26px; font-weight: 700; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
  .export-btn { display: block; margin: 0 auto 20px; padding: 8px 22px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Authentication Flow</h1>
<p class="subtitle">JWT HS256 · Access + Refresh tokens · JTI blacklist logout · Rate-limited endpoints</p>
<button class="export-btn" onclick="window.print()">Print / Export PDF</button>

<svg width="900" height="820" viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#16a34a"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Swim-lane backgrounds -->
  <!-- Client lane -->
  <rect x="10" y="10" width="200" height="800" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="110" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">CLIENT</text>

  <!-- FastAPI lane -->
  <rect x="220" y="10" width="240" height="800" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="340" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">FastAPI / routes/auth.py</text>

  <!-- Auth module lane -->
  <rect x="470" y="10" width="200" height="800" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="570" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#7e22ce">auth.py</text>

  <!-- MongoDB lane -->
  <rect x="680" y="10" width="210" height="800" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="785" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">MongoDB</text>

  <!-- ── REGISTER FLOW ── -->
  <text x="450" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" letter-spacing="1">── REGISTER ──</text>

  <rect x="30" y="72" width="160" height="36" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="110" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">POST /api/auth/register</text>

  <line x1="190" y1="90" x2="230" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="232" y="72" width="218" height="36" rx="6" fill="#22c55e" filter="url(#sh)"/>
  <text x="341" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">validate · hash bcrypt</text>
  <text x="341" y="103" text-anchor="middle" font-size="9" fill="#dcfce7">check duplicate email</text>

  <line x1="450" y1="90" x2="480" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="482" y="72" width="168" height="36" rx="6" fill="#a855f7" filter="url(#sh)"/>
  <text x="566" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">create_access_token</text>

  <line x1="650" y1="90" x2="690" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="692" y="72" width="180" height="36" rx="6" fill="#64748b" filter="url(#sh)"/>
  <text x="782" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">users.insert_one()</text>

  <!-- ── LOGIN FLOW ── -->
  <text x="450" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" letter-spacing="1">── LOGIN ──</text>

  <rect x="30" y="152" width="160" height="36" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="110" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">POST /api/auth/login</text>

  <line x1="190" y1="170" x2="230" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="232" y="152" width="218" height="36" rx="6" fill="#22c55e" filter="url(#sh)"/>
  <text x="341" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">bcrypt.verify(password)</text>
  <text x="341" y="183" text-anchor="middle" font-size="9" fill="#dcfce7">lookup user by email</text>

  <line x1="450" y1="170" x2="480" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="482" y="152" width="168" height="52" rx="6" fill="#a855f7" filter="url(#sh)"/>
  <text x="566" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">create_access_token</text>
  <text x="566" y="190" text-anchor="middle" font-size="9" fill="#ede9fe">JWT HS256, exp 15min</text>
  <text x="566" y="202" text-anchor="middle" font-size="9" fill="#ede9fe">+ create_refresh_token</text>

  <line x1="650" y1="178" x2="690" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="692" y="160" width="180" height="52" rx="6" fill="#64748b" filter="url(#sh)"/>
  <text x="782" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">refresh_tokens</text>
  <text x="782" y="196" text-anchor="middle" font-size="9" fill="#e2e8f0">.insert_one()</text>
  <text x="782" y="208" text-anchor="middle" font-size="9" fill="#e2e8f0">TTL: 30 days</text>

  <!-- Return access+refresh to client -->
  <line x1="482" y1="196" x2="192" y2="196" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="340" y="212" text-anchor="middle" font-size="9" fill="#16a34a">{ access_token, refresh_token }</text>

  <!-- ── PROTECTED REQUEST ── -->
  <text x="450" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" letter-spacing="1">── AUTHENTICATED REQUEST ──</text>

  <rect x="30" y="256" width="160" height="52" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="110" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">POST /api/chat</text>
  <text x="110" y="295" text-anchor="middle" font-size="9" fill="#bfdbfe">Authorization: Bearer &lt;AT&gt;</text>

  <line x1="190" y1="282" x2="230" y2="282" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="232" y="256" width="218" height="52" rx="6" fill="#22c55e" filter="url(#sh)"/>
  <text x="341" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">rate_limit check</text>
  <text x="341" y="294" text-anchor="middle" font-size="9" fill="#dcfce7">slowapi · 20/min per user</text>
  <text x="341" y="307" text-anchor="middle" font-size="9" fill="#dcfce7">then → decode_token()</text>

  <line x1="450" y1="282" x2="480" y2="282" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="482" y="256" width="168" height="52" rx="6" fill="#a855f7" filter="url(#sh)"/>
  <text x="566" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">jwt.decode()</text>
  <text x="566" y="294" text-anchor="middle" font-size="9" fill="#ede9fe">verify sig + exp</text>
  <text x="566" y="307" text-anchor="middle" font-size="9" fill="#ede9fe">check jti_blacklist</text>

  <line x1="650" y1="282" x2="690" y2="282" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="692" y="256" width="180" height="52" rx="6" fill="#64748b" filter="url(#sh)"/>
  <text x="782" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">jti_blacklist.find_one</text>
  <text x="782" y="294" text-anchor="middle" font-size="9" fill="#e2e8f0">(jti) → 401 if found</text>

  <!-- ── REFRESH ── -->
  <text x="450" y="346" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" letter-spacing="1">── TOKEN REFRESH ──</text>

  <rect x="30" y="356" width="160" height="36" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="110" y="379" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">POST /api/auth/refresh</text>

  <line x1="190" y1="374" x2="230" y2="374" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="232" y="356" width="218" height="52" rx="6" fill="#22c55e" filter="url(#sh)"/>
  <text x="341" y="374" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">find refresh token in DB</text>
  <text x="341" y="390" text-anchor="middle" font-size="9" fill="#dcfce7">verify not expired</text>
  <text x="341" y="403" text-anchor="middle" font-size="9" fill="#dcfce7">→ issue new access token</text>

  <line x1="450" y1="382" x2="480" y2="382" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="482" y="356" width="168" height="36" rx="6" fill="#a855f7" filter="url(#sh)"/>
  <text x="566" y="379" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">create_access_token</text>

  <!-- Return new AT -->
  <line x1="482" y1="390" x2="192" y2="390" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="340" y="404" text-anchor="middle" font-size="9" fill="#16a34a">{ access_token } (new 15-min token)</text>

  <!-- ── LOGOUT ── -->
  <text x="450" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" letter-spacing="1">── LOGOUT ──</text>

  <rect x="30" y="450" width="160" height="36" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="110" y="473" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">POST /api/auth/logout</text>

  <line x1="190" y1="468" x2="230" y2="468" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="232" y="450" width="218" height="36" rx="6" fill="#22c55e" filter="url(#sh)"/>
  <text x="341" y="473" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">extract JTI from token</text>

  <line x1="450" y1="468" x2="480" y2="468" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="482" y="450" width="168" height="36" rx="6" fill="#a855f7" filter="url(#sh)"/>
  <text x="566" y="473" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">blacklist JTI</text>

  <line x1="650" y1="468" x2="690" y2="468" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="692" y="450" width="180" height="52" rx="6" fill="#64748b" filter="url(#sh)"/>
  <text x="782" y="470" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">jti_blacklist.insert_one</text>
  <text x="782" y="486" text-anchor="middle" font-size="9" fill="#e2e8f0">+ refresh_tokens.delete_one</text>

  <!-- ── ERROR PATHS ── -->
  <text x="450" y="548" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" letter-spacing="1">── ERROR / REJECTION PATHS ──</text>

  <rect x="232" y="558" width="218" height="36" rx="6" fill="#dc2626" filter="url(#sh)"/>
  <text x="341" y="581" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">401 — bad credentials</text>

  <rect x="232" y="604" width="218" height="36" rx="6" fill="#dc2626" filter="url(#sh)"/>
  <text x="341" y="627" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">401 — expired token</text>

  <rect x="232" y="650" width="218" height="36" rx="6" fill="#dc2626" filter="url(#sh)"/>
  <text x="341" y="673" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">401 — JTI blacklisted</text>

  <rect x="232" y="696" width="218" height="36" rx="6" fill="#f97316" filter="url(#sh)"/>
  <text x="341" y="719" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">429 — rate limit exceeded</text>

  <!-- Error arrows to client -->
  <line x1="232" y1="576" x2="192" y2="576" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <line x1="232" y1="622" x2="192" y2="622" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <line x1="232" y1="668" x2="192" y2="668" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <line x1="232" y1="714" x2="192" y2="714" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>

  <!-- JWT info box -->
  <rect x="482" y="548" width="400" height="200" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="682" y="572" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">Token Specification</text>
  <line x1="482" y1="580" x2="882" y2="580" stroke="#e9d5ff" stroke-width="1"/>
  <text x="498" y="600" font-size="10" fill="#6b7280">Algorithm:   HS256</text>
  <text x="498" y="618" font-size="10" fill="#6b7280">Access token expiry:   15 minutes</text>
  <text x="498" y="636" font-size="10" fill="#6b7280">Refresh token expiry:  30 days</text>
  <text x="498" y="654" font-size="10" fill="#6b7280">Claims:  sub (user_id), jti (UUID4), exp, iat</text>
  <text x="498" y="672" font-size="10" fill="#6b7280">JTI:  stored in jti_blacklist on logout</text>
  <text x="498" y="690" font-size="10" fill="#6b7280">Blacklist TTL:  matches token expiry (auto-evict)</text>
  <text x="498" y="708" font-size="10" fill="#6b7280">Secret:  from env JWT_SECRET</text>
  <text x="498" y="726" font-size="10" fill="#6b7280">Rate limit:  slowapi · keyed on JWT sub or IP</text>
</svg>
</body>
</html>
